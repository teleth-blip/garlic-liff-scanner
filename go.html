<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>にんにく冷蔵庫 起動</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f5f7f5;
    }
    .panel {
      max-width: 520px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      background: #fff;
    }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { line-height: 1.6; }
    a {
      display: inline-block;
      min-height: 44px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #27765d;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>にんにく冷蔵庫を開いています</h1>
    <p id="message">少し待っても切り替わらない場合は、下のボタンを押してください。</p>
    <p><a id="openLink" href="#">開く</a></p>
  </main>
  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbwV9IecaDNZL6sfojQxGZjZ4wlS19nzJkWJi4ZkiaCnNlLx8yoD1UzgQbAcMgPErwt3DA/exec';
    const params = new URLSearchParams(location.search);
    const palletNo = params.get('pallet') || params.get('palletNo') || params.get('p') || params.get('qr') || '';
    const mode = params.get('mode') || params.get('action') || '';
    const target = new URL(APP_URL);
    if (palletNo) target.searchParams.set('pallet', palletNo);
    if (mode) target.searchParams.set('mode', mode);
    const href = target.toString();
    const link = document.getElementById('openLink');
    link.href = href;
    document.getElementById('message').textContent = palletNo
      ? `パレット ${palletNo} の画面を開いています。`
      : 'にんにく冷蔵庫管理を開いています。';
    setTimeout(() => {
      location.replace(href);
    }, 100);
  </script>
</body>
</html>
