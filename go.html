<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>にんにく冷蔵庫 起動</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17211b;
      background: #f3f6f4;
    }
    .panel {
      max-width: 520px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #d8e0da;
      border-radius: 8px;
      background: #fff;
    }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { line-height: 1.6; }
    a {
      display: inline-block;
      min-height: 44px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #176b55;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>にんにく冷蔵庫を開いています</h1>
    <p id="message">少し待っても切り替わらない場合は、下のボタンを押してください。</p>
    <a id="openLink" href="./">開く</a>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const target = new URL('./', location.href);
    ['pallet', 'palletNo', 'p', 'qr', 'mode', 'action'].forEach(key => {
      const value = params.get(key);
      if (value) target.searchParams.set(key, value);
    });
    const href = target.toString();
    document.getElementById('openLink').href = href;
    const palletNo = target.searchParams.get('pallet') || target.searchParams.get('palletNo') || target.searchParams.get('p') || '';
    document.getElementById('message').textContent = palletNo
      ? `パレット ${palletNo} の画面を開きます。`
      : 'にんにく冷蔵庫管理を開きます。';
    setTimeout(() => {
      location.replace(href);
    }, 100);
  </script>
</body>
</html>
