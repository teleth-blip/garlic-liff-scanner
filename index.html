<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>にんにく冷蔵庫管理</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --bg: #f3f6f4;
      --panel: #ffffff;
      --ink: #17211b;
      --muted: #647067;
      --line: #d8e0da;
      --brand: #176b55;
      --brand-dark: #0f4f3f;
      --warn: #b54708;
      --danger: #b42318;
      --soft: #eef4f0;
      --disabled: #e5e7eb;
      --used: #d9eee6;
      --selected: #f7d56b;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 100%;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .header-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-width: none;
      margin: 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0;
    }
    .worker-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    main {
      width: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 8px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0 10px;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }
    .tab.active {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }
    .panel {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .hidden { display: none !important; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    h3 {
      margin: 12px 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
      color: #344139;
    }
    input, select, textarea {
      min-height: 44px;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #bfcbc4;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    button {
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }
    button.scan-button {
      min-width: 82px;
      background: #0b6fba;
      border-color: #0b6fba;
      color: #fff;
      box-shadow: 0 2px 0 rgba(0, 0, 0, .15);
    }
    button.danger {
      background: var(--danger);
      border-color: var(--danger);
    }
    button.small {
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .field-with-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .notice {
      padding: 10px 12px;
      border: 1px solid #b9d8ca;
      border-radius: 8px;
      background: #eef8f3;
      color: #123d31;
      font-weight: 700;
    }
    .notice.warn {
      border-color: #f0c48b;
      background: #fff7ed;
      color: #7a3f00;
    }
    .muted { color: var(--muted); }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }
    th {
      background: #f7faf8;
      font-weight: 800;
      white-space: nowrap;
    }
    td input, td select {
      min-height: 38px;
      padding: 6px 8px;
    }
    .grid-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      align-items: end;
    }
    .location-grid {
      display: grid;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .cell {
      min-width: 78px;
      min-height: 56px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .cell.available { background: #fff; }
    .cell.used { background: #d7f0df; border-color: #58aa72; color: #12381f; }
    .cell.removable { background: #d7f0df; border-color: #27765d; color: #12381f; }
    .cell.unavailable { background: var(--disabled); color: #6b7280; border-color: #c7ccd1; }
    .cell.stack-blocked { background: #fff1d6; color: #7a3f00; border-color: #e6ad45; }
    .cell.selected { background: var(--selected); border-color: #af7f00; }
    .cell .sub {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .pallet-summary {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafcfb;
    }
    .summary-detail {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
    }
    .summary-detail th, .summary-detail td {
      padding: 5px 6px;
      border: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.2;
    }
    .summary-detail th { background: #eef4f0; }
    tr.selectable-row {
      cursor: pointer;
    }
    tr.selectable-row.selected {
      background: #fff8dc;
    }
    .moving-list {
      display: grid;
      gap: 8px;
      margin: 10px 0;
    }
    .moving-item {
      display: grid;
      gap: 3px;
      width: 100%;
      min-height: 48px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }
    .moving-item.selected {
      border-color: #27765d;
      background: #e9f7ef;
    }
    .moving-item .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    details.master-section {
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    details.master-section > summary {
      padding: 12px 14px;
      font-weight: 900;
      cursor: pointer;
      background: #f7faf8;
    }
    details.master-section > .master-body {
      padding: 12px;
      border-top: 1px solid var(--line);
    }
    .scanner-panel {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, .72);
    }
    .scanner-box {
      width: min(680px, 100%);
      padding: 12px;
      border-radius: 8px;
      background: #fff;
    }
    #scannerVideo {
      width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      background: #111;
    }
    #toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 200;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 8px;
      background: #17211b;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 28px rgba(0,0,0,.2);
    }
    #toast.error { background: var(--danger); }
    .qr-pick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .label-sheet {
      display: grid;
      grid-template-columns: repeat(2, 120mm);
      grid-template-rows: repeat(3, 63mm);
      width: 240mm;
      min-height: 189mm;
      margin: 14px auto;
      background: #fff;
    }
    .qr-label {
      width: 120mm;
      height: 63mm;
      padding: 5mm;
      border: 1px dashed #c9cfd4;
      display: grid;
      grid-template-columns: 47mm 1fr;
      gap: 4mm;
      align-items: start;
      overflow: hidden;
      break-inside: avoid;
    }
    .qr-label.blank { border-color: transparent; }
    .qr-code svg {
      width: 47mm;
      height: 47mm;
      display: block;
    }
    .qr-meta {
      min-width: 0;
      font-size: 10px;
      line-height: 1.22;
    }
    .qr-meta .pallet-no {
      margin-bottom: 2mm;
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .qr-title-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 3mm;
      align-items: baseline;
      margin-bottom: 2mm;
    }
    .qr-title-line .pallet-no { margin-bottom: 0; }
    .qr-date {
      white-space: nowrap;
      font-size: 10px;
      font-weight: 800;
    }
    .detail-mini {
      width: 100%;
      min-width: 0;
      margin-top: 2mm;
      border-collapse: collapse;
    }
    .detail-mini th, .detail-mini td {
      padding: 1mm 1.2mm;
      border: 1px solid #222;
      font-size: 8.5px;
      line-height: 1.05;
    }
    .detail-mini th { background: #f2f2f2; }
    @media (min-width: 780px) {
      .header-row {
        grid-template-columns: 1fr minmax(360px, 460px);
        align-items: center;
      }
    }
    @media (max-width: 720px) {
      main { padding: 6px; }
      .panel {
        margin-left: -6px;
        margin-right: -6px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }
      .qr-pick-grid { grid-template-columns: 1fr; }
      .field-with-button { grid-template-columns: 1fr 96px; }
    }
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: #fff; }
      .app-header, .tabs, .panel:not(#qrPanel), #qrPanel .section-title, #qrPanel .form-grid, #qrPanel .qr-pick-grid, #qrPanel .action-row, #toast, #scannerPanel {
        display: none !important;
      }
      main { width: 297mm; padding: 0; }
      #qrPanel {
        display: block !important;
        margin: 0;
        padding: 0;
        border: none;
      }
      .label-sheet {
        margin: 10.5mm 28.5mm;
        page-break-after: always;
      }
      .qr-label {
        border: none;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1>にんにく冷蔵庫管理</h1>
      <div class="worker-bar">
        <label>作業者
          <select id="workerSelect"></select>
        </label>
        <button type="button" id="reloadBtn" class="secondary">更新</button>
      </div>
    </div>
  </header>

  <main>
    <section id="launchPanel" class="panel hidden">
      <div class="section-title">
        <h2>QR読取パレット</h2>
        <span id="launchPalletNo" class="notice"></span>
      </div>
      <div class="action-row">
        <button type="button" data-launch-action="inbound">入庫へ</button>
        <button type="button" data-launch-action="outbound">出庫へ</button>
        <button type="button" data-launch-action="move">移動へ</button>
      </div>
    </section>

    <nav class="tabs" aria-label="機能">
      <button type="button" class="tab active" data-tab="register">登録</button>
      <button type="button" class="tab" data-tab="qr">QR印刷</button>
      <button type="button" class="tab" data-tab="inbound">入庫</button>
      <button type="button" class="tab" data-tab="outbound">出庫</button>
      <button type="button" class="tab" data-tab="move">移動</button>
      <button type="button" class="tab" data-tab="inventory">配置確認</button>
      <button type="button" class="tab" data-tab="master">マスタ</button>
    </nav>

    <section id="registerPanel" class="panel" data-panel="register">
      <div class="section-title">
        <h2 id="registerTitle">パレット登録</h2>
        <button type="button" id="clearRegisterBtn" class="secondary small">入力クリア</button>
      </div>
      <div class="form-grid">
        <label>年産
          <input id="regYear" inputmode="numeric" autocomplete="off">
        </label>
        <label>パレット番号
          <input id="regPalletNo" placeholder="空欄なら自動採番">
        </label>
        <label>重量（明細合計）
          <input id="regWeight" inputmode="decimal" readonly>
        </label>
        <label>状態
          <select id="regStatus" disabled>
            <option value="未配置">未配置</option>
            <option value="保管中">保管中</option>
            <option value="仮移動中">仮移動中</option>
            <option value="出庫済">出庫済</option>
          </select>
        </label>
        <label>備考
          <input id="regMemo">
        </label>
      </div>
      <h3>明細</h3>
      <div class="table-wrap">
        <table id="detailTable">
          <thead><tr><th>生産者番号</th><th>規格</th><th>重量</th><th>価格</th><th>備考</th><th></th></tr></thead>
          <tbody id="detailRows"></tbody>
        </table>
      </div>
      <div class="action-row">
        <button type="button" id="addDetailBtn" class="secondary">明細追加</button>
        <button type="button" id="savePalletBtn">登録</button>
      </div>
      <h3>登録済みパレット</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>パレット番号</th><th>状態</th><th>重量</th><th>場所</th><th>備考</th><th>操作</th></tr></thead>
          <tbody id="registeredPalletRows"></tbody>
        </table>
      </div>
    </section>

    <section id="qrPanel" class="panel hidden" data-panel="qr">
      <div class="section-title">
        <h2>QR印刷</h2>
        <span class="muted">A-one 72206 / A4横 / 2列3行</span>
      </div>
      <div class="qr-pick-grid">
        <label>左列パレット番号
          <input id="qrLeftNo" list="qrPalletOptions" autocomplete="off">
        </label>
        <label>右列パレット番号
          <input id="qrRightNo" list="qrPalletOptions" autocomplete="off">
        </label>
      </div>
      <datalist id="qrPalletOptions"></datalist>
      <div class="action-row">
        <button type="button" id="clearQrBtn" class="secondary">入力クリア</button>
        <button type="button" id="printBtn">印刷</button>
      </div>
      <div id="printArea" class="label-sheet"></div>
    </section>

    <section id="inboundPanel" class="panel hidden" data-panel="inbound">
      <div class="section-title"><h2>入庫</h2></div>
      <div class="grid-controls">
        <label>冷蔵庫
          <select id="inCooler"></select>
        </label>
        <label>段
          <select id="inLevel"></select>
        </label>
      </div>
      <div class="form-grid">
        <div class="field-with-button">
          <label>パレット番号
            <input id="inPalletNo" autocomplete="off">
          </label>
          <button type="button" class="scan-button" data-scan-target="inPalletNo">読取</button>
        </div>
        <label>備考
          <input id="inMemo">
        </label>
      </div>
      <div id="inPalletSummary" class="pallet-summary hidden"></div>
      <div id="inGrid" class="location-grid"></div>
      <div class="action-row">
        <button type="button" id="inboundBtn">入庫登録</button>
      </div>
    </section>

    <section id="outboundPanel" class="panel hidden" data-panel="outbound">
      <div class="section-title"><h2>出庫</h2></div>
      <div class="grid-controls">
        <label>冷蔵庫
          <select id="outCooler"></select>
        </label>
        <label>段
          <select id="outLevel"></select>
        </label>
      </div>
      <div class="form-grid">
        <div class="field-with-button">
          <label>パレット番号
            <input id="outPalletNo" autocomplete="off">
          </label>
          <button type="button" class="scan-button" data-scan-target="outPalletNo">読取</button>
        </div>
        <label>備考
          <input id="outMemo">
        </label>
      </div>
      <div id="outPalletSummary" class="pallet-summary hidden"></div>
      <div id="outGrid" class="location-grid"></div>
      <div class="action-row">
        <button type="button" id="outboundBtn">出庫確定</button>
      </div>
    </section>

    <section id="movePanel" class="panel hidden" data-panel="move">
      <div class="section-title"><h2>移動</h2></div>
      <h3>仮移動</h3>
      <div class="grid-controls">
        <label>冷蔵庫
          <select id="moveStartCooler"></select>
        </label>
        <label>段
          <select id="moveStartLevel"></select>
        </label>
      </div>
      <div class="form-grid">
        <div class="field-with-button">
          <label>動かすパレット番号
            <input id="moveStartPalletNo" autocomplete="off">
          </label>
          <button type="button" class="scan-button" data-scan-target="moveStartPalletNo">読取</button>
        </div>
        <label>備考
          <input id="moveStartMemo">
        </label>
      </div>
      <div id="moveStartSummary" class="pallet-summary hidden"></div>
      <div id="moveStartGrid" class="location-grid"></div>
      <div class="action-row">
        <button type="button" id="moveStartBtn">仮移動</button>
      </div>
      <h3>移動確定</h3>
      <div class="grid-controls">
        <label>冷蔵庫
          <select id="moveCooler"></select>
        </label>
        <label>段
          <select id="moveLevel"></select>
        </label>
      </div>
      <div id="moveGrid" class="location-grid"></div>
      <div id="movingList" class="moving-list"></div>
      <div class="form-grid">
        <div class="field-with-button">
          <label>確定するパレット番号
            <input id="moveDonePalletNo" autocomplete="off">
          </label>
          <button type="button" class="scan-button" data-scan-target="moveDonePalletNo">読取</button>
        </div>
        <label>備考
          <input id="moveDoneMemo">
        </label>
      </div>
      <div id="moveDoneSummary" class="pallet-summary hidden"></div>
      <div class="action-row">
        <button type="button" id="moveDoneBtn">移動確定</button>
      </div>
    </section>

    <section id="inventoryPanel" class="panel hidden" data-panel="inventory">
      <div class="section-title"><h2>配置確認</h2></div>
      <div class="grid-controls">
        <label>冷蔵庫
          <select id="checkCooler"></select>
        </label>
        <label>段
          <select id="checkLevel"></select>
        </label>
        <label>パレット検索
          <input id="searchPallet" autocomplete="off">
        </label>
      </div>
      <div id="checkGrid" class="location-grid"></div>
      <div id="checkPalletSummary" class="pallet-summary hidden"></div>
      <h3>状態別一覧</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>パレット番号</th><th>状態</th><th>重量</th><th>場所</th><th>登録日</th></tr></thead>
          <tbody id="inventoryRows"></tbody>
        </table>
      </div>
    </section>

    <section id="masterPanel" class="panel hidden" data-panel="master">
      <div class="section-title"><h2>マスタ管理</h2></div>
      <details class="master-section">
        <summary>規格マスタ</summary>
        <div class="master-body">
          <div class="table-wrap">
            <table><thead><tr><th>ID</th><th>規格名</th><th>表示順</th><th>有効</th><th></th></tr></thead><tbody id="standardRows"></tbody></table>
          </div>
          <div class="action-row">
            <button type="button" id="addStandardBtn" class="secondary">追加</button>
            <button type="button" id="saveStandardsBtn">保存</button>
          </div>
        </div>
      </details>
      <details class="master-section">
        <summary>冷蔵庫マスタ</summary>
        <div class="master-body">
          <div class="table-wrap">
            <table><thead><tr><th>ID</th><th>冷蔵庫名</th><th>最大段</th><th>行</th><th>列</th><th>有効</th><th></th></tr></thead><tbody id="coolerRows"></tbody></table>
          </div>
          <div class="action-row">
            <button type="button" id="addCoolerBtn" class="secondary">追加</button>
            <button type="button" id="saveCoolersBtn">保存</button>
          </div>
        </div>
      </details>
      <details class="master-section" open>
        <summary>保管場所マスタ</summary>
        <div class="master-body">
          <div class="grid-controls">
            <label>冷蔵庫
              <select id="masterCooler"></select>
            </label>
            <label>段
              <select id="masterLevel"></select>
            </label>
          </div>
          <div id="masterGrid" class="location-grid"></div>
          <div class="action-row">
            <button type="button" id="saveLocationsBtn">保管場所保存</button>
          </div>
        </div>
      </details>
      <details class="master-section">
        <summary>作業者マスタ</summary>
        <div class="master-body">
          <div class="table-wrap">
            <table><thead><tr><th>ID</th><th>作業者名</th><th>役割</th><th>表示順</th><th>有効</th><th>備考</th><th></th></tr></thead><tbody id="workerRows"></tbody></table>
          </div>
          <div class="action-row">
            <button type="button" id="addWorkerBtn" class="secondary">追加</button>
            <button type="button" id="saveWorkersBtn">保存</button>
          </div>
        </div>
      </details>
      <details class="master-section">
        <summary>操作履歴</summary>
        <div class="master-body">
          <div class="table-wrap">
            <table><thead><tr><th>日時</th><th>作業者</th><th>操作</th><th>パレット</th><th>内容</th><th>備考</th></tr></thead><tbody id="historyRows"></tbody></table>
          </div>
        </div>
      </details>
    </section>
  </main>

  <div id="scannerPanel" class="scanner-panel hidden">
    <div class="scanner-box">
      <video id="scannerVideo" autoplay muted playsinline></video>
      <div class="action-row">
        <button type="button" id="stopScanBtn" class="secondary">閉じる</button>
      </div>
    </div>
  </div>
  <div id="toast" class="hidden"></div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwV9IecaDNZL6sfojQxGZjZ4wlS19nzJkWJi4ZkiaCnNlLx8yoD1UzgQbAcMgPErwt3DA/exec';
    const APP_HOME_URL = location.origin + location.pathname;
    const LIFF_ID = '2010379383-rwQBpt0b';
    const state = {
      data: null,
      workers: [],
      workerId: localStorage.getItem('garlic.workerId') || '',
      tab: 'register',
      editPalletNo: '',
      selectedLocations: { inbound: '', outbound: '', moveStart: '', move: '' },
      inventorySelectedPalletNo: '',
      busy: false,
      qrPrint: { left: '', right: '' },
      masterDraftKey: '',
      masterUnavailable: new Set(),
      scanner: null,
      liff: {
        initPromise: null,
        initialized: false
      },
      apiBridge: {
        frame: null,
        ready: false,
        readyPromise: null,
        readyResolve: null,
        readyReject: null,
        pending: {}
      },
      launch: getLaunchParams()
    };

    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const num = value => Number(value || 0).toLocaleString('ja-JP');

    window.addEventListener('message', handleApiBridgeMessage);
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      bindEvents();
      setDefaultYear();
      if (state.launch.palletNo) {
        $('launchPanel').classList.remove('hidden');
        $('launchPalletNo').textContent = state.launch.palletNo;
      }
      await refreshAll();
      if (state.launch.palletNo && state.launch.mode) applyLaunchAction(state.launch.mode);
    }

    function bindEvents() {
      document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => setTab(btn.dataset.tab)));
      document.querySelectorAll('[data-launch-action]').forEach(btn => btn.addEventListener('click', () => applyLaunchAction(btn.dataset.launchAction)));
      document.querySelectorAll('[data-scan-target]').forEach(btn => btn.addEventListener('click', () => startScanner(btn.dataset.scanTarget)));
      $('reloadBtn').addEventListener('click', refreshAll);
      $('workerSelect').addEventListener('change', () => {
        state.workerId = $('workerSelect').value;
        localStorage.setItem('garlic.workerId', state.workerId);
      });
      $('clearRegisterBtn').addEventListener('click', clearRegisterForm);
      $('addDetailBtn').addEventListener('click', () => addDetailRow());
      $('savePalletBtn').addEventListener('click', () => withBusy('savePalletBtn', '保存中...', savePallet));
      $('qrLeftNo').addEventListener('input', () => { state.qrPrint.left = $('qrLeftNo').value.trim(); renderPrintArea(); });
      $('qrRightNo').addEventListener('input', () => { state.qrPrint.right = $('qrRightNo').value.trim(); renderPrintArea(); });
      $('clearQrBtn').addEventListener('click', () => {
        state.qrPrint.left = '';
        state.qrPrint.right = '';
        $('qrLeftNo').value = '';
        $('qrRightNo').value = '';
        renderPrintArea();
      });
      $('printBtn').addEventListener('click', () => window.print());
      $('inCooler').addEventListener('change', () => { renderLevelOptions('inLevel', selectedCooler('inCooler')); state.selectedLocations.inbound = ''; renderInboundGrid(); });
      $('inLevel').addEventListener('change', () => { state.selectedLocations.inbound = ''; renderInboundGrid(); });
      $('inPalletNo').addEventListener('input', () => renderActionPallet('in'));
      $('inboundBtn').addEventListener('click', () => withBusy('inboundBtn', '入庫中...', recordInbound));
      $('outCooler').addEventListener('change', () => { renderLevelOptions('outLevel', selectedCooler('outCooler')); state.selectedLocations.outbound = ''; renderOutboundGrid(); });
      $('outLevel').addEventListener('change', () => { state.selectedLocations.outbound = ''; renderOutboundGrid(); });
      $('outPalletNo').addEventListener('input', () => { state.selectedLocations.outbound = ''; renderActionPallet('out'); renderOutboundGrid(); });
      $('outboundBtn').addEventListener('click', () => withBusy('outboundBtn', '出庫中...', recordOutbound));
      $('moveStartCooler').addEventListener('change', () => { renderLevelOptions('moveStartLevel', selectedCooler('moveStartCooler')); state.selectedLocations.moveStart = ''; renderMoveStartGrid(); });
      $('moveStartLevel').addEventListener('change', () => { state.selectedLocations.moveStart = ''; renderMoveStartGrid(); });
      $('moveStartPalletNo').addEventListener('input', () => { state.selectedLocations.moveStart = ''; renderActionPallet('moveStart'); renderMoveStartGrid(); });
      $('moveStartBtn').addEventListener('click', () => withBusy('moveStartBtn', '仮移動中...', startMove));
      $('moveCooler').addEventListener('change', () => { renderLevelOptions('moveLevel', selectedCooler('moveCooler')); state.selectedLocations.move = ''; renderMoveGrid(); });
      $('moveLevel').addEventListener('change', () => { state.selectedLocations.move = ''; renderMoveGrid(); });
      $('moveDonePalletNo').addEventListener('input', () => { renderActionPallet('moveDone'); renderMovingList(); });
      $('moveDoneBtn').addEventListener('click', () => withBusy('moveDoneBtn', '確定中...', completeMove));
      $('checkCooler').addEventListener('change', () => { renderLevelOptions('checkLevel', selectedCooler('checkCooler')); renderCheckGrid(); });
      $('checkLevel').addEventListener('change', renderCheckGrid);
      $('searchPallet').addEventListener('input', renderInventoryRows);
      $('addStandardBtn').addEventListener('click', addStandardRow);
      $('saveStandardsBtn').addEventListener('click', () => withBusy('saveStandardsBtn', '保存中...', saveStandards));
      $('addCoolerBtn').addEventListener('click', addCoolerRow);
      $('saveCoolersBtn').addEventListener('click', () => withBusy('saveCoolersBtn', '保存中...', saveCoolers));
      $('masterCooler').addEventListener('change', () => { renderLevelOptions('masterLevel', selectedCooler('masterCooler')); loadMasterDraft(); renderMasterGrid(); });
      $('masterLevel').addEventListener('change', () => { loadMasterDraft(); renderMasterGrid(); });
      $('saveLocationsBtn').addEventListener('click', () => withBusy('saveLocationsBtn', '保存中...', saveLocations));
      $('addWorkerBtn').addEventListener('click', addWorkerRow);
      $('saveWorkersBtn').addEventListener('click', () => withBusy('saveWorkersBtn', '保存中...', saveWorkers));
      $('stopScanBtn').addEventListener('click', stopScanner);
    }

    async function withBusy(buttonId, busyText, task) {
      if (state.busy) return;
      const btn = $(buttonId);
      const originalText = btn ? btn.textContent : '';
      const buttons = Array.from(document.querySelectorAll('button'));
      const disabledStates = buttons.map(button => [button, button.disabled]);
      state.busy = true;
      buttons.forEach(button => button.disabled = true);
      if (btn) {
        btn.disabled = true;
        btn.textContent = busyText;
      }
      showToast(busyText);
      try {
        await task();
      } finally {
        disabledStates.forEach(([button, wasDisabled]) => button.disabled = wasDisabled);
        if (btn && btn.textContent === busyText) btn.textContent = originalText;
        state.busy = false;
      }
    }

    async function refreshAll() {
      try {
        showToast('作業者を読み込んでいます。');
        await refreshWorkersOnly().catch(error => console.warn(error));
        showToast('データを読み込んでいます。');
        const data = await api('getAppData');
        state.data = data;
        state.workers = data.master.workers || state.workers;
        ensureWorkerSelection();
        renderAll();
        showToast('読み込みました。');
      } catch (error) {
        showToast(error.message, true);
      }
    }

    function renderAll() {
      if (!state.data) return;
      state.workers = state.data.master.workers || state.workers;
      renderWorkers();
      renderSelectors();
      if (!state.editPalletNo && !$('detailRows').children.length) addDetailRow();
      renderRegisterTable();
      renderQrChoices();
      renderPrintArea();
      renderInboundGrid();
      renderOutboundGrid();
      renderMoveStartGrid();
      renderMoveGrid();
      renderMovingList();
      renderCheckGrid();
      renderInventoryRows();
      renderInventoryPallet();
      renderMaster();
      renderActionPallet('in');
      renderActionPallet('out');
      renderActionPallet('moveStart');
      renderActionPallet('moveDone');
    }

    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll('[data-tab]').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      document.querySelectorAll('[data-panel]').forEach(panel => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
    }

    function getLaunchParams() {
      const params = mergedUrlParams();
      return {
        palletNo: params.get('pallet') || params.get('palletNo') || params.get('p') || params.get('qr') || '',
        mode: params.get('mode') || params.get('action') || ''
      };
    }

    function mergedUrlParams() {
      const merged = new URLSearchParams(location.search);
      const liffState = merged.get('liff.state');
      if (liffState) {
        const normalized = liffState.startsWith('?') ? liffState.slice(1) : liffState;
        const stateParams = new URLSearchParams(normalized);
        stateParams.forEach((value, key) => {
          if (!merged.has(key)) merged.set(key, value);
        });
      }
      return merged;
    }

    function applyLaunchAction(action) {
      const palletNo = state.launch.palletNo;
      if (!palletNo) return;
      if (action === 'inbound') {
        $('inPalletNo').value = palletNo;
        setTab('inbound');
        renderActionPallet('in');
      } else if (action === 'outbound') {
        $('outPalletNo').value = palletNo;
        setTab('outbound');
        renderActionPallet('out');
      } else {
        const pallet = findPallet(palletNo);
        if (pallet && pallet.status === '仮移動中') $('moveDonePalletNo').value = palletNo;
        else $('moveStartPalletNo').value = palletNo;
        setTab('move');
        renderActionPallet('moveStart');
        renderActionPallet('moveDone');
      }
    }

    function setDefaultYear() {
      $('regYear').value = String(new Date().getFullYear());
    }

    function ensureWorkerSelection() {
      const workers = activeWorkers();
      if (!state.workerId || !workers.some(w => w.workerId === state.workerId)) {
        state.workerId = workers[0] ? workers[0].workerId : '';
        if (state.workerId) localStorage.setItem('garlic.workerId', state.workerId);
      }
    }

    function renderWorkers() {
      $('workerSelect').innerHTML = activeWorkers().map(w => `<option value="${esc(w.workerId)}">${esc(w.workerName)}（${esc(w.workerId)}）</option>`).join('');
      $('workerSelect').value = state.workerId;
    }

    async function refreshWorkersOnly() {
      const res = await api('getWorkers');
      state.workers = res && res.master && Array.isArray(res.master.workers) ? res.master.workers : [];
      ensureWorkerSelection();
      renderWorkers();
    }

    function renderSelectors() {
      ['inCooler', 'outCooler', 'moveStartCooler', 'moveCooler', 'checkCooler', 'masterCooler'].forEach(id => renderCoolerOptions(id));
      renderLevelOptions('inLevel', selectedCooler('inCooler'));
      renderLevelOptions('outLevel', selectedCooler('outCooler'));
      renderLevelOptions('moveStartLevel', selectedCooler('moveStartCooler'));
      renderLevelOptions('moveLevel', selectedCooler('moveCooler'));
      renderLevelOptions('checkLevel', selectedCooler('checkCooler'));
      renderLevelOptions('masterLevel', selectedCooler('masterCooler'));
      if (!state.masterDraftKey) loadMasterDraft();
    }

    function renderCoolerOptions(id) {
      const select = $(id);
      const previous = select.value;
      const coolers = activeCoolers();
      select.innerHTML = coolers.map(c => `<option value="${esc(c.coolerId)}">${esc(c.coolerName)}（${esc(c.coolerId)}）</option>`).join('');
      if (coolers.some(c => c.coolerId === previous)) select.value = previous;
    }

    function renderLevelOptions(id, cooler) {
      const select = $(id);
      const previous = select.value || '1';
      const max = cooler ? Number(cooler.maxLevel || 1) : 1;
      select.innerHTML = Array.from({ length: max }, (_, i) => `<option value="${i + 1}">${i + 1}段目</option>`).join('');
      select.value = Number(previous) <= max ? previous : '1';
    }

    function renderRegisterTable() {
      $('registeredPalletRows').innerHTML = sortedPallets().map(p => `
        <tr>
          <td>${esc(p.palletNo)}</td>
          <td>${esc(p.status)}</td>
          <td>${num(p.weight)}</td>
          <td>${esc(p.currentLocationName || '')}</td>
          <td>${esc(p.memo || '')}</td>
          <td>
            <button type="button" class="secondary small" data-edit-pallet="${esc(p.palletNo)}">編集</button>
            <button type="button" class="danger small" data-delete-pallet="${esc(p.palletNo)}">削除</button>
          </td>
        </tr>
      `).join('');
      document.querySelectorAll('[data-edit-pallet]').forEach(btn => btn.addEventListener('click', () => editPallet(btn.dataset.editPallet)));
      document.querySelectorAll('[data-delete-pallet]').forEach(btn => btn.addEventListener('click', () => deletePallet(btn.dataset.deletePallet)));
    }

    function addDetailRow(data = {}) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input data-detail="producerNo" value="${esc(data.producerNo || '')}"></td>
        <td><select data-detail="standard">${standardOptions(data.standard || '')}</select></td>
        <td><input data-detail="weight" inputmode="decimal" value="${esc(data.weight || '')}"></td>
        <td><input data-detail="price" inputmode="decimal" value="${esc(data.price || '')}"></td>
        <td><input data-detail="memo" value="${esc(data.memo || '')}"></td>
        <td><button type="button" class="secondary small">削除</button></td>
      `;
      tr.querySelector('[data-detail="weight"]').addEventListener('input', updateRegisterWeight);
      tr.querySelector('button').addEventListener('click', () => {
        tr.remove();
        updateRegisterWeight();
      });
      $('detailRows').appendChild(tr);
      updateRegisterWeight();
    }

    function standardOptions(selected) {
      return activeStandards().map(s => `<option value="${esc(s.standardName)}" ${s.standardName === selected ? 'selected' : ''}>${esc(s.standardName)}</option>`).join('');
    }

    function clearRegisterForm() {
      state.editPalletNo = '';
      $('registerTitle').textContent = 'パレット登録';
      $('savePalletBtn').textContent = '登録';
      $('regPalletNo').disabled = false;
      $('regPalletNo').value = '';
      $('regStatus').value = '未配置';
      $('regStatus').disabled = true;
      $('regWeight').value = '';
      $('regMemo').value = '';
      setDefaultYear();
      $('detailRows').innerHTML = '';
      addDetailRow();
    }

    function editPallet(palletNo) {
      const pallet = findPallet(palletNo);
      if (!pallet) return;
      state.editPalletNo = palletNo;
      $('registerTitle').textContent = `パレット編集 ${palletNo}`;
      $('savePalletBtn').textContent = '変更保存';
      $('regYear').value = pallet.productionYear || String(new Date().getFullYear());
      $('regPalletNo').value = pallet.palletNo;
      $('regPalletNo').disabled = true;
      $('regStatus').value = pallet.status || '未配置';
      $('regStatus').disabled = false;
      $('regWeight').value = pallet.weight || '';
      $('regMemo').value = pallet.memo || '';
      $('detailRows').innerHTML = '';
      detailsFor(palletNo).forEach(addDetailRow);
      if (!$('detailRows').children.length) addDetailRow();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function savePallet() {
      try {
        const payload = {
          productionYear: $('regYear').value,
          palletNo: $('regPalletNo').value,
          weight: $('regWeight').value,
          status: state.editPalletNo ? $('regStatus').value : '未配置',
          memo: $('regMemo').value,
          details: collectDetails()
        };
        const method = state.editPalletNo ? 'updatePallet' : 'registerPallet';
        if (state.editPalletNo) payload.palletNo = state.editPalletNo;
        const res = await api(method, payload);
        applyDataResponse(res);
        clearRegisterForm();
      } catch (error) {
        showToast(error.message, true);
      }
    }

    function collectDetails() {
      updateRegisterWeight();
      return Array.from($('detailRows').querySelectorAll('tr')).map(tr => ({
        producerNo: tr.querySelector('[data-detail="producerNo"]').value,
        standard: tr.querySelector('[data-detail="standard"]').value,
        weight: tr.querySelector('[data-detail="weight"]').value,
        price: tr.querySelector('[data-detail="price"]').value,
        memo: tr.querySelector('[data-detail="memo"]').value
      })).filter(r => r.producerNo || r.standard || r.weight || r.price || r.memo);
    }

    function updateRegisterWeight() {
      const total = Array.from($('detailRows').querySelectorAll('[data-detail="weight"]'))
        .reduce((sum, input) => sum + parseInputNumber(input.value), 0);
      $('regWeight').value = total ? formatInputNumber(total) : '';
    }

    function parseInputNumber(value) {
      const n = Number(String(value || '').replace(/,/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function formatInputNumber(value) {
      return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(3)));
    }

    async function deletePallet(palletNo) {
      if (!confirm(`${palletNo} を削除しますか。`)) return;
      try {
        const res = await api('deletePallet', { palletNo });
        applyDataResponse(res);
      } catch (error) {
        showToast(error.message, true);
      }
    }

    function renderQrChoices() {
      $('qrPalletOptions').innerHTML = sortedPallets()
        .map(p => `<option value="${esc(p.palletNo)}">${esc(p.status)} / ${num(p.weight)}kg</option>`)
        .join('');
    }

    function renderPrintArea() {
      const left = findPallet(state.qrPrint.left || $('qrLeftNo').value);
      const right = findPallet(state.qrPrint.right || $('qrRightNo').value);
      const labels = [];
      for (let row = 0; row < 3; row++) {
        labels.push(left ? qrLabelHtml(left) : '<div class="qr-label blank"></div>');
        labels.push(right ? qrLabelHtml(right) : '<div class="qr-label blank"></div>');
      }
      $('printArea').innerHTML = labels.join('');
    }

    function qrLabelHtml(pallet) {
      const details = detailsFor(pallet.palletNo);
      return `
        <div class="qr-label">
          <div class="qr-code">${qrSvg(pallet.palletNo)}</div>
          <div class="qr-meta">
            <div class="qr-title-line">
              <div class="pallet-no">${esc(pallet.palletNo)}</div>
              <div class="qr-date">${esc(formatReiwaDate(new Date()))}</div>
            </div>
            <div>重量 ${num(pallet.weight)}kg</div>
            ${details.length ? detailMiniTable(details) : '<div>明細なし</div>'}
          </div>
        </div>
      `;
    }

    function detailMiniTable(details) {
      return `<table class="detail-mini"><thead><tr><th>生産者</th><th>規格</th><th>重量</th><th>価格</th></tr></thead><tbody>${
        details.map(d => `<tr><td>${esc(d.producerNo)}</td><td>${esc(d.standard)}</td><td>${num(d.weight)}</td><td>${num(d.price)}</td></tr>`).join('')
      }</tbody></table>`;
    }

    function qrSvg(text) {
      if (!window.qrcode) return `<div>${esc(text)}</div>`;
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      return qr.createSvgTag(5, 1);
    }

    function formatReiwaDate(date) {
      const year = date.getFullYear();
      const reiwa = year - 2018;
      return `令和${reiwa}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function renderInboundGrid() {
      renderSelectableGrid('inGrid', selectedCooler('inCooler'), Number($('inLevel').value || 1), 'inbound');
    }

    function renderMoveGrid() {
      renderSelectableGrid('moveGrid', selectedCooler('moveCooler'), Number($('moveLevel').value || 1), 'move');
    }

    function renderOutboundGrid() {
      renderRemovalGrid('outGrid', selectedCooler('outCooler'), Number($('outLevel').value || 1), 'outbound');
    }

    function renderMoveStartGrid() {
      renderRemovalGrid('moveStartGrid', selectedCooler('moveStartCooler'), Number($('moveStartLevel').value || 1), 'moveStart');
    }

    function renderSelectableGrid(containerId, cooler, level, kind) {
      const container = $(containerId);
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const placement = placementByLocation();
      const locations = locationMatrix(cooler, level);
      container.style.gridTemplateColumns = `repeat(${cooler.colCount}, minmax(78px, 1fr))`;
      container.innerHTML = locations.map(loc => {
        const placed = placement[loc.locationId];
        const selected = state.selectedLocations[kind] === loc.locationId;
        const support = stackSupport(loc, placement);
        const canSelect = !!loc.available && !placed && support.ok;
        const cls = !loc.available ? 'unavailable' : placed ? 'used' : !support.ok ? 'stack-blocked' : selected ? 'selected' : 'available';
        const label = !loc.available ? '使用不可' : placed ? placed.palletNo : '空き';
        const sub = placed ? '使用済み' : !loc.available ? (loc.note || '') : support.message;
        return `<button type="button" class="cell ${cls}" data-location="${esc(loc.locationId)}" ${canSelect ? '' : 'disabled'}>${esc(label)}${sub ? `<span class="sub">${esc(sub)}</span>` : ''}</button>`;
      }).join('');
      container.querySelectorAll('[data-location]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedLocations[kind] = btn.dataset.location;
        kind === 'inbound' ? renderInboundGrid() : renderMoveGrid();
      }));
    }

    function renderRemovalGrid(containerId, cooler, level, kind) {
      const container = $(containerId);
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const placement = placementByLocation();
      const locations = locationMatrix(cooler, level);
      const inputId = kind === 'outbound' ? 'outPalletNo' : 'moveStartPalletNo';
      const currentPalletNo = $(inputId).value.trim();
      container.style.gridTemplateColumns = `repeat(${cooler.colCount}, minmax(78px, 1fr))`;
      container.innerHTML = locations.map(loc => {
        const placed = placement[loc.locationId];
        const selected = state.selectedLocations[kind] === loc.locationId || (placed && placed.palletNo === currentPalletNo);
        const upper = upperClear(loc, placement, cooler);
        const canSelect = !!loc.available && !!placed && upper.ok;
        const cls = !loc.available ? 'unavailable' : !placed ? 'available' : !upper.ok ? 'stack-blocked' : selected ? 'selected' : 'removable';
        const label = !loc.available ? '使用不可' : placed ? placed.palletNo : '空き';
        const sub = !loc.available ? (loc.note || '') : placed ? (upper.message || '出庫可能') : '';
        return `<button type="button" class="cell ${cls}" data-remove-location="${esc(loc.locationId)}" data-remove-pallet="${esc(placed ? placed.palletNo : '')}" ${canSelect ? '' : 'disabled'}>${esc(label)}${sub ? `<span class="sub">${esc(sub)}</span>` : ''}</button>`;
      }).join('');
      container.querySelectorAll('[data-remove-location]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedLocations[kind] = btn.dataset.removeLocation;
        $(inputId).value = btn.dataset.removePallet || '';
        renderActionPallet(kind === 'outbound' ? 'out' : 'moveStart');
        kind === 'outbound' ? renderOutboundGrid() : renderMoveStartGrid();
      }));
    }

    function stackSupport(loc, placement) {
      const level = Number(loc.level || 1);
      if (level <= 1) return { ok: true, message: '' };
      const lowerId = makeLocationId(loc.coolerId, level - 1, loc.row, loc.col);
      const lowerLocation = state.data.master.locations.find(item => item.locationId === lowerId);
      if (!lowerLocation || !lowerLocation.available) {
        return { ok: false, message: `${level - 1}段目が使用不可` };
      }
      if (!placement[lowerId]) {
        return { ok: false, message: `${level - 1}段目にパレットが必要` };
      }
      return { ok: true, message: `${level - 1}段目あり` };
    }

    function upperClear(loc, placement, cooler) {
      const level = Number(loc.level || 1);
      const maxLevel = Number(cooler && cooler.maxLevel || 1);
      if (level >= maxLevel) return { ok: true, message: '上段なし' };
      const upperId = makeLocationId(loc.coolerId, level + 1, loc.row, loc.col);
      const upperLocation = state.data.master.locations.find(item => item.locationId === upperId);
      if (!upperLocation || !upperLocation.available) return { ok: true, message: `${level + 1}段目使用不可` };
      if (placement[upperId]) return { ok: false, message: `${level + 1}段目あり` };
      return { ok: true, message: `${level + 1}段目空き` };
    }

    async function api(method, payload = {}) {
      if (method === 'getAppData' || method === 'getWorkers' || method === 'ping') {
        return firstSuccessfulApi([
          () => apiViaJsonp(method, payload),
          () => apiViaBridge(method, payload)
        ]);
      }
      try {
        return await apiViaBridge(method, payload);
      } catch (error) {
        if (error.requestSent && method !== 'getAppData' && method !== 'getWorkers' && method !== 'ping') throw error;
        return apiViaJsonp(method, payload);
      }
    }

    function firstSuccessfulApi(tasks) {
      return new Promise((resolve, reject) => {
        let failures = 0;
        let lastError = null;
        tasks.forEach(run => {
          run().then(resolve).catch(error => {
            failures += 1;
            lastError = error;
            if (failures === tasks.length) reject(lastError || new Error('Apps Script APIを読み込めませんでした。'));
          });
        });
      });
    }

    function apiViaBridge(method, payload = {}) {
      return ensureApiBridge().then(() => new Promise((resolve, reject) => {
        const id = `bridge_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const timer = setTimeout(() => {
          delete state.apiBridge.pending[id];
          const error = new Error('Apps Script APIが応答しませんでした。');
          error.requestSent = true;
          reject(error);
        }, 45000);
        state.apiBridge.pending[id] = { resolve, reject, timer };
        try {
          state.apiBridge.frame.contentWindow.postMessage({
            type: 'garlic-api-request',
            id,
            request: { method, workerId: state.workerId, payload }
          }, '*');
        } catch (error) {
          clearTimeout(timer);
          delete state.apiBridge.pending[id];
          error.bridgeUnavailable = true;
          reject(error);
        }
      }));
    }

    function ensureApiBridge() {
      if (state.apiBridge.ready) return Promise.resolve();
      if (state.apiBridge.readyPromise) return state.apiBridge.readyPromise;
      state.apiBridge.readyPromise = new Promise((resolve, reject) => {
        state.apiBridge.readyResolve = resolve;
        state.apiBridge.readyReject = reject;
        const timer = setTimeout(() => {
          if (state.apiBridge.ready) return;
          const error = new Error('Apps Script通信フレームを起動できませんでした。');
          error.bridgeUnavailable = true;
          reject(error);
        }, 9000);
        const frame = document.createElement('iframe');
        frame.hidden = true;
        frame.setAttribute('aria-hidden', 'true');
        frame.style.display = 'none';
        frame.src = `${GAS_API_URL}?bridge=1&parent=${encodeURIComponent(location.origin)}&_=${Date.now()}`;
        frame.onerror = () => {
          clearTimeout(timer);
          const error = new Error('Apps Script通信フレームを読み込めませんでした。');
          error.bridgeUnavailable = true;
          reject(error);
        };
        state.apiBridge.frame = frame;
        state.apiBridge.readyTimer = timer;
        document.body.appendChild(frame);
      });
      return state.apiBridge.readyPromise;
    }

    function handleApiBridgeMessage(event) {
      if (!isApiBridgeOrigin(event.origin)) return;
      const message = event.data || {};
      if (message.type === 'garlic-api-ready') {
        state.apiBridge.ready = true;
        if (state.apiBridge.readyTimer) clearTimeout(state.apiBridge.readyTimer);
        if (state.apiBridge.readyResolve) state.apiBridge.readyResolve();
        return;
      }
      if (message.type !== 'garlic-api-response') return;
      const pending = state.apiBridge.pending[message.id];
      if (!pending) return;
      clearTimeout(pending.timer);
      delete state.apiBridge.pending[message.id];
      const response = message.response;
      if (!response || response.ok === false) {
        pending.reject(new Error(response && response.error ? response.error : 'APIエラーです。'));
      } else {
        pending.resolve(response);
      }
    }

    function isApiBridgeOrigin(origin) {
      return origin === 'https://script.google.com' || /\.googleusercontent\.com$/.test(origin);
    }

    function apiViaJsonp(method, payload = {}) {
      return new Promise((resolve, reject) => {
        window.__garlicApiCallbacks = window.__garlicApiCallbacks || {};
        const id = `cb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const cbName = `__garlicApiCallbacks.${id}`;
        const url = new URL(GAS_API_URL);
        url.searchParams.set('api', '1');
        url.searchParams.set('method', method);
        url.searchParams.set('callback', cbName);
        url.searchParams.set('_', String(Date.now()));
        if (state.workerId) url.searchParams.set('workerId', state.workerId);
        if (payload && Object.keys(payload).length) url.searchParams.set('payload', JSON.stringify(payload));
        if (url.toString().length > 18000) {
          reject(new Error('送信内容が大きすぎます。分割して保存してください。'));
          return;
        }
        const script = document.createElement('script');
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Apps Script APIが応答しませんでした。'));
        }, 30000);
        function cleanup() {
          clearTimeout(timer);
          delete window.__garlicApiCallbacks[id];
          script.remove();
        }
        window.__garlicApiCallbacks[id] = response => {
          cleanup();
          if (!response || response.ok === false) reject(new Error(response && response.error ? response.error : 'APIエラーです。'));
          else resolve(response);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error('Apps Script APIを読み込めませんでした。'));
        };
        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function startScanner(targetId) {
      if (isLineClient()) {
        try {
          await startLiffScanner(targetId);
          return;
        } catch (error) {
          showToast(lineScanErrorMessage(error), true);
          return;
        }
      }
      await startCameraScanner(targetId);

    async function startLiffScanner(targetId) {
      await ensureLiff();
      if (!window.liff || typeof liff.scanCodeV2 !== 'function') {
        throw new Error('LIFFのQR読取機能を利用できません。');
      }
      const context = typeof liff.getContext === 'function' ? liff.getContext() : null;
      if (context && context.viewType && context.viewType !== 'full') {
        throw new Error('LINE LIFFの画面サイズをFullにしてください。');
      }
      const result = await liff.scanCodeV2();
      const raw = result && result.value ? result.value : '';
      if (!raw) throw new Error('QRコードを読み取れませんでした。');
      applyScannedText(targetId, raw);
    }

    function ensureLiff() {
      if (state.liff.initialized) return Promise.resolve();
      if (state.liff.initPromise) return state.liff.initPromise;
      if (!window.liff || typeof liff.init !== 'function') {
        return Promise.reject(new Error('LIFF SDKを読み込めませんでした。'));
      }
      state.liff.initPromise = Promise.race([
        liff.init({ liffId: LIFF_ID }),
        new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF初期化が応答しません。')), 12000))
      ]).then(() => {
        state.liff.initialized = true;
      });
      return state.liff.initPromise;
    }

    function isLineClient() {
      if (window.liff && typeof liff.isInClient === 'function' && liff.isInClient()) return true;
      return /\bLine\//i.test(navigator.userAgent || '');
    }

    function lineScanErrorMessage(error) {
      const code = error && error.code ? `${error.code}: ` : '';
      const message = error && error.message ? error.message : String(error || '');
      if (/init|LIFF|liff/i.test(message)) {
        return `${code}${message} LINEで読取を使う場合は、通常URLではなくLIFF URLから開いてください。`;
      }
      if (/permission|forbidden|denied/i.test(message) || code === 'FORBIDDEN: ') {
        return `${code}${message} LINE DevelopersのLIFF設定で、画面サイズFullとScan QRが有効か確認してください。`;
      }
      return `${code}${message || 'LINEのQR読取を開始できませんでした。'}`;
    }

    async function startCameraScanner(targetId) {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('このブラウザではカメラを直接起動できません。');
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        const video = $('scannerVideo');
        video.srcObject = stream;
        await video.play();
        $('scannerPanel').classList.remove('hidden');
        let detector = null;
        if ('BarcodeDetector' in window) {
          try { detector = new BarcodeDetector({ formats: ['qr_code'] }); } catch (e) { detector = null; }
        }
        state.scanner = { targetId, stream, detector, active: true, canvas: document.createElement('canvas'), raf: 0 };
        scanLoop();
      } catch (error) {
        showToast(error.message || 'カメラを起動できませんでした。', true);
      }
    }

    async function scanLoop() {
      if (!state.scanner || !state.scanner.active) return;
      const video = $('scannerVideo');
      try {
        let text = '';
        if (state.scanner.detector) {
          const codes = await state.scanner.detector.detect(video);
          if (codes && codes.length) text = codes[0].rawValue || '';
        }
        if (!text && window.jsQR && video.videoWidth && video.videoHeight) {
          const canvas = state.scanner.canvas;
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(image.data, image.width, image.height, { inversionAttempts: 'dontInvert' });
          if (code && code.data) text = code.data;
        }
        if (text) {
          applyScannedText(state.scanner.targetId, text);
          stopScanner();
          return;
        }
      } catch (error) {
        console.warn(error);
      }
      if (state.scanner && state.scanner.active) state.scanner.raf = requestAnimationFrame(scanLoop);
    }

    function stopScanner() {
      if (state.scanner) {
        state.scanner.active = false;
        if (state.scanner.raf) cancelAnimationFrame(state.scanner.raf);
        if (state.scanner.stream) state.scanner.stream.getTracks().forEach(track => track.stop());
      }
      state.scanner = null;
      $('scannerVideo').srcObject = null;
      $('scannerPanel').classList.add('hidden');
    }

    function applyScannedText(targetId, text) {
      const palletNo = extractPalletNo(text);
      $(targetId).value = palletNo;
      $(targetId).dispatchEvent(new Event('input'));
      showToast(`読み取りました: ${palletNo}`);
    }

    function extractPalletNo(text) {
      const raw = String(text || '').trim();
      try {
        const url = new URL(raw);
        const value = url.searchParams.get('pallet') || url.searchParams.get('palletNo') || url.searchParams.get('p') || url.searchParams.get('qr');
        if (value) return value.trim();
      } catch (e) {}
      const match = raw.match(/\d{4}-\d{1,}/);
      return match ? `${match[0].slice(0, 5)}${match[0].slice(5).padStart(4, '0')}` : raw;
    }

    function showToast(message, isError = false) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.toggle('error', !!isError);
      toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.add('hidden'), isError ? 5200 : 2400);
    }

    function activeWorkers() {
      const workers = state.workers.length ? state.workers : (state.data ? state.data.master.workers : []);
      return workers.filter(w => w.active);
    }
    function activeCoolers() { return state.data ? state.data.master.coolers.filter(c => c.active) : []; }
    function activeStandards() { return state.data ? state.data.master.standards.filter(s => s.active) : []; }
    function sortedPallets() { return state.data ? [...state.data.pallets].sort((a, b) => a.palletNo.localeCompare(b.palletNo)) : []; }
    function findPallet(palletNo) { return state.data && state.data.pallets.find(p => p.palletNo === String(palletNo || '').trim()); }
    function detailsFor(palletNo) { return state.data ? state.data.details.filter(d => d.palletNo === palletNo).sort((a, b) => a.detailNo - b.detailNo) : []; }
    function selectedCooler(selectId) { const id = $(selectId).value; return activeCoolers().find(c => c.coolerId === id) || activeCoolers()[0] || null; }
    function placementByLocation() {
      const map = {};
      (state.data ? state.data.placements : []).forEach(p => map[p.locationId] = p);
      return map;
    }
    function locationMatrix(cooler, level) {
      const existing = {};
      state.data.master.locations
        .filter(loc => loc.coolerId === cooler.coolerId && Number(loc.level) === Number(level))
        .forEach(loc => existing[`${loc.row}-${loc.col}`] = loc);
      const list = [];
      for (let row = 1; row <= Number(cooler.rowCount); row++) {
        for (let col = 1; col <= Number(cooler.colCount); col++) {
          list.push(existing[`${row}-${col}`] || {
            locationId: makeLocationId(cooler.coolerId, level, row, col),
            coolerId: cooler.coolerId,
            level,
            row,
            col,
            displayName: `R${String(row).padStart(2, '0')}-C${String(col).padStart(2, '0')}`,
            available: true
          });
        }
      }
      return list;
    }
    function makeLocationId(coolerId, level, row, col) {
      return `${coolerId}-${level}-R${String(row).padStart(2, '0')}-C${String(col).padStart(2, '0')}`;
    }
  </script>
</body>
