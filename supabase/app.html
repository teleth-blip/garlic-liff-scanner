<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>にんにく冷蔵庫管理 DB版</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f3f6f4;
      --panel: #ffffff;
      --ink: #17211b;
      --muted: #647067;
      --line: #d8e0da;
      --brand: #176b55;
      --brand-dark: #0f4f3f;
      --warn: #b54708;
      --danger: #b42318;
      --soft: #eef4f0;
      --disabled: #e5e7eb;
      --used: #d9eee6;
      --selected: #f7d56b;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 100%;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: none;
      margin: 0 auto;
      min-width: 0;
    }
    h1 {
      flex: 0 0 auto;
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
      line-height: 1.2;
      white-space: nowrap;
    }
    .worker-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 auto;
      justify-content: flex-end;
      min-width: 0;
      margin-left: auto;
    }
    .worker-select-label {
      display: grid;
      grid-template-columns: auto minmax(96px, 1fr);
      align-items: center;
      gap: 5px;
      flex: 1 1 auto;
      max-width: 170px;
      min-width: 0;
      font-size: 12px;
      white-space: nowrap;
    }
    .worker-select-label select {
      width: 100%;
      min-height: 36px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .header-btn {
      min-height: 36px;
      padding: 7px 9px;
      font-size: 12px;
      white-space: nowrap;
    }
    body.login-locked .app-header,
    body.login-locked main {
      display: none;
    }
    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background: var(--bg);
    }
    .login-card {
      width: min(100%, 420px);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .12);
    }
    .login-card h2 {
      margin-bottom: 14px;
      font-size: 18px;
    }
    .login-card .login-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .login-message {
      min-height: 20px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }
    @media (max-width: 420px) {
      .app-header {
        padding: 6px;
      }
      .header-row {
        gap: 5px;
      }
      h1 {
        font-size: 14px;
      }
      .worker-bar {
        gap: 4px;
      }
      .worker-select-label {
        grid-template-columns: minmax(82px, 1fr);
        max-width: 118px;
      }
      .worker-select-label span {
        display: none;
      }
      .worker-select-label select {
        min-height: 34px;
        padding: 5px 6px;
        font-size: 12px;
      }
      .header-btn {
        min-height: 34px;
        padding: 5px 6px;
        font-size: 11px;
      }
    }
    main {
      width: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 8px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0 10px;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }
    .tab.active {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }
    .sub-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
      padding: 4px;
      border: 1px solid #cbd8d0;
      border-radius: 10px;
      background: #edf4ef;
    }
    .sub-tab {
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font-weight: 800;
    }
    .sub-tab.active {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }
    .panel {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .hidden { display: none !important; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    h3 {
      margin: 12px 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
      color: #344139;
    }
    input, select, textarea {
      min-height: 44px;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #bfcbc4;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    button {
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }
    button.danger {
      background: var(--danger);
      border-color: var(--danger);
    }
    button.small {
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .memo-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .field-with-button {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: end;
    }
    .notice {
      padding: 10px 12px;
      border: 1px solid #b9d8ca;
      border-radius: 8px;
      background: #eef8f3;
      color: #123d31;
      font-weight: 700;
    }
    .notice.warn {
      border-color: #f0c48b;
      background: #fff7ed;
      color: #7a3f00;
    }
    .setting-status {
      margin-top: 10px;
      font-size: 13px;
    }
    .muted { color: var(--muted); }
    .panel-note {
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .table-wrap {
      overflow: auto;
      max-height: min(62vh, 520px);
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }
    th {
      background: #f7faf8;
      font-weight: 800;
      white-space: nowrap;
    }
    td input, td select {
      min-height: 38px;
      padding: 6px 8px;
    }
    .grid-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      align-items: end;
    }
    .operation-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 76px minmax(122px, 158px);
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
      min-width: 0;
    }
    .operation-row select,
    .operation-row input {
      min-width: 0;
    }
    .pallet-lock-field {
      display: grid;
      gap: 5px;
    }
    .pallet-lock-field input:read-only {
      border-color: #af7f00;
      background: #fff8dc;
      font-weight: 800;
    }
    .unlock-pallet-btn {
      min-height: 44px;
      padding: 8px 10px;
      font-size: 13px;
      white-space: nowrap;
    }
    @media (max-width: 420px) {
      .operation-row {
        grid-template-columns: minmax(138px, 1fr) 66px minmax(106px, 128px);
        gap: 6px;
      }
      .operation-row label {
        font-size: 12px;
      }
      .operation-row select,
      .operation-row input {
        min-height: 40px;
        padding: 7px 8px;
      }
    }
    .location-grid {
      display: grid;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      align-items: stretch;
    }
    .grid-axis-corner,
    .grid-col-label,
    .grid-row-label {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef4f0;
      color: #344139;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .grid-axis-corner {
      font-size: 11px;
      color: var(--muted);
    }
    .grid-row-label {
      min-height: 56px;
    }
    .cell {
      min-width: 78px;
      min-height: 56px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .cell.available { background: #fff; }
    .cell.used { background: #d7f0df; border-color: #58aa72; color: #12381f; }
    .cell.removable { background: #d7f0df; border-color: #27765d; color: #12381f; }
    .cell.unavailable { background: var(--disabled); color: #6b7280; border-color: #c7ccd1; }
    .cell.stack-blocked { background: #fff1d6; color: #7a3f00; border-color: #e6ad45; }
    .cell.selected { background: var(--selected); border-color: #af7f00; }
    .cell.locked-target {
      border-color: #af7f00;
      box-shadow: 0 0 0 3px rgba(255, 214, 102, .75);
    }
    .cell .sub {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .pallet-summary {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafcfb;
    }
    .producer-cell {
      display: grid;
      gap: 4px;
      min-width: 220px;
    }
    .producer-cell input {
      min-height: 36px;
      padding: 6px 8px;
    }
    .producer-suggestions {
      display: grid;
      gap: 4px;
      width: 100%;
      min-width: 260px;
      max-height: min(52vh, 360px);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .12);
    }
    .producer-suggestions.hidden {
      display: none;
    }
    .producer-option {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid #d7ded9;
      border-radius: 8px;
      background: #f8fbf9;
      color: var(--ink);
      text-align: left;
      font-weight: 700;
    }
    .producer-option .producer-name {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }
    .producer-no-match {
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .summary-detail {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
    }
    .summary-detail th, .summary-detail td {
      padding: 5px 6px;
      border: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.2;
    }
    .summary-detail th { background: #eef4f0; }
    tr.selectable-row {
      cursor: pointer;
    }
    tr.selectable-row.selected {
      background: #fff8dc;
    }
    .moving-list {
      display: grid;
      gap: 8px;
      margin: 10px 0;
      max-height: min(52vh, 420px);
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .moving-item {
      display: grid;
      gap: 3px;
      width: 100%;
      min-height: 48px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }
    .moving-item.selected {
      border-color: #27765d;
      background: #e9f7ef;
    }
    .moving-item .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .search-section {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .search-groups {
      display: grid;
      gap: 8px;
    }
    .search-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .search-group > summary {
      display: grid;
      grid-template-columns: minmax(140px, 1.5fr) minmax(70px, .7fr) minmax(70px, .7fr) minmax(80px, .8fr) minmax(150px, 1.5fr) minmax(56px, auto);
      gap: 8px;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      list-style: none;
    }
    .search-group > summary::-webkit-details-marker {
      display: none;
    }
    .search-group > summary::after {
      content: "開く";
      justify-self: end;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
    }
    .search-group[open] > summary::after {
      content: "閉じる";
    }
    .search-summary-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .search-detail-table {
      border-top: 1px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .search-detail-table table {
      min-width: 860px;
    }
    .search-detail-table tr {
      cursor: pointer;
    }
    .search-detail-table td:last-child {
      white-space: nowrap;
    }
    .search-empty {
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-weight: 700;
      background: #fff;
    }
    @media (max-width: 720px) {
      .search-group > summary {
        grid-template-columns: 1fr 1fr;
      }
      .search-group > summary::after {
        grid-column: 2;
      }
    }
    details.master-section {
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    details.master-section > summary {
      padding: 12px 14px;
      font-weight: 900;
      cursor: pointer;
      background: #f7faf8;
    }
    details.master-section > .master-body {
      padding: 12px;
      border-top: 1px solid var(--line);
    }
    #masterPanel .table-wrap {
      max-height: none;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior: auto;
      touch-action: pan-x pan-y;
    }
    #masterPanel input,
    #masterPanel select,
    #masterPanel textarea {
      touch-action: pan-y;
    }
    #toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 200;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 8px;
      background: #17211b;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 28px rgba(0,0,0,.2);
    }
    #toast.error { background: var(--danger); }
    .qr-pick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .pallet-pick-field {
      position: relative;
    }
    .pallet-suggestions {
      display: grid;
      gap: 4px;
      width: 100%;
      max-height: min(52vh, 360px);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .12);
    }
    .pallet-suggestions.hidden {
      display: none;
    }
    .pallet-option {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid #d7ded9;
      border-radius: 8px;
      background: #f8fbf9;
      color: var(--ink);
      text-align: left;
      font-weight: 700;
    }
    .pallet-option .pallet-option-main {
      display: block;
      line-height: 1.25;
    }
    .pallet-option .pallet-option-sub {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }
    .label-sheet {
      display: grid;
      grid-template-columns: repeat(2, 120mm);
      grid-template-rows: repeat(3, 63mm);
      width: 240mm;
      min-height: 189mm;
      margin: 14px auto;
      background: #fff;
    }
    .qr-label {
      width: 120mm;
      height: 63mm;
      padding: 5mm;
      border: 1px dashed #c9cfd4;
      display: grid;
      grid-template-columns: 47mm 1fr;
      gap: 4mm;
      align-items: start;
      overflow: hidden;
      break-inside: avoid;
    }
    .qr-label.blank { border-color: transparent; }
    .qr-code svg {
      width: 47mm;
      height: 47mm;
      display: block;
    }
    .qr-meta {
      min-width: 0;
      font-size: 10px;
      line-height: 1.22;
    }
    .qr-meta .pallet-no {
      margin-bottom: 2mm;
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .qr-title-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 3mm;
      align-items: baseline;
      margin-bottom: 2mm;
    }
    .qr-title-line .pallet-no { margin-bottom: 0; }
    .qr-date {
      white-space: nowrap;
      font-size: 10px;
      font-weight: 800;
    }
    .detail-mini {
      width: 100%;
      min-width: 0;
      margin-top: 2mm;
      border-collapse: collapse;
    }
    .detail-mini th, .detail-mini td {
      padding: 1mm 1.2mm;
      border: 1px solid #222;
      font-size: 8.5px;
      line-height: 1.05;
    }
    .detail-mini th { background: #f2f2f2; }
    @media (min-width: 780px) {
      .header-row {
        grid-template-columns: 1fr minmax(360px, 460px);
        align-items: center;
      }
    }
    @media (max-width: 720px) {
      main { padding: 6px; }
      .panel {
        margin-left: -6px;
        margin-right: -6px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }
      .qr-pick-grid { grid-template-columns: 1fr; }
      .field-with-button { grid-template-columns: 1fr; }
    }
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: #fff; }
      .app-header, .tabs, .panel:not(#qrPanel), #qrPanel .section-title, #qrPanel .form-grid, #qrPanel .qr-pick-grid, #qrPanel .action-row, #toast {
        display: none !important;
      }
      main { width: 297mm; padding: 0; }
      #qrPanel {
        display: block !important;
        margin: 0;
        padding: 0;
        border: none;
      }
      .label-sheet {
        margin: 10.5mm 28.5mm;
        page-break-after: always;
      }
      .qr-label {
        border: none;
      }
    }
  </style>
</head>
<body class="login-locked">
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <h2>ログイン</h2>
      <label>作業者
        <select id="loginWorkerSelect"></select>
      </label>
      <label>PIN
        <input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="必須">

    function bindMasterScrollAssist() {
      const panel = $('masterPanel');
      let drag = null;
      const findField = target => target && target.closest && target.closest('#masterPanel input, #masterPanel select, #masterPanel textarea');

      panel.addEventListener('wheel', event => {
        if (!findField(event.target) || Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
        window.scrollBy({ top: event.deltaY, left: 0, behavior: 'auto' });
        event.preventDefault();
      }, { passive: false });

      panel.addEventListener('touchstart', event => {
        const field = findField(event.target);
        if (!field || event.touches.length !== 1) {
          drag = null;
          return;
        }
        const touch = event.touches[0];
        drag = { startX: touch.clientX, startY: touch.clientY, lastY: touch.clientY, active: false };
      }, { passive: true });

      panel.addEventListener('touchmove', event => {
        if (!drag || event.touches.length !== 1) return;
        const touch = event.touches[0];
        const dx = touch.clientX - drag.startX;
        const dy = touch.clientY - drag.startY;
        if (!drag.active) {
          if (Math.abs(dy) < 12 || Math.abs(dy) <= Math.abs(dx)) return;
          drag.active = true;
          if (document.activeElement && panel.contains(document.activeElement) && document.activeElement.blur) {
            document.activeElement.blur();
          }
        }
        window.scrollBy(0, drag.lastY - touch.clientY);
        drag.lastY = touch.clientY;
        event.preventDefault();
      }, { passive: false });

      ['touchend', 'touchcancel'].forEach(type => {
        panel.addEventListener(type, () => { drag = null; }, { passive: true });
      });
    }

    async function withBusy(buttonId, busyText, task) {
      if (state.busy) return;
      const btn = $(buttonId);
      const originalText = btn ? btn.textContent : '';
      const buttons = Array.from(document.querySelectorAll('button'));
      const disabledStates = buttons.map(button => [button, button.disabled]);
      state.busy = true;
      buttons.forEach(button => button.disabled = true);
      if (btn) {
        btn.disabled = true;
        btn.textContent = busyText;
      }
      showToast(busyText);
      try {
        await task();
      } finally {
        disabledStates.forEach(([button, wasDisabled]) => button.disabled = wasDisabled);
        if (btn && btn.textContent === busyText) btn.textContent = originalText;
        state.busy = false;
      }
    }

      }
    }

    function renderAll() {
      if (!state.data) return;
      state.workers = state.data.master.workers || state.workers;
      renderWorkers();
      renderSelectors();
      renderProducerOptions();
      if (!state.editPalletNo && !$('detailRows').children.length) addDetailRow();
      renderRegisterTable();
      renderQrChoices();
      renderPrintArea();
      renderInboundGrid();
      renderOutboundGrid();
      renderMoveStartGrid();
      renderMoveGrid();
      renderMovingList();
      renderCheckGrid();
      renderInventoryRows();
      renderInventoryPallet();
      renderSearch();
      renderMaster();
      renderActionPallet('in');
      renderActionPallet('out');
      renderActionPallet('moveStart');
      renderActionPallet('moveDone');
      renderPalletLocks();
      renderMoveMode();
    }

    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll('[data-tab]').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      document.querySelectorAll('[data-panel]').forEach(panel => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
    }

    function setMoveMode(mode) {
      state.moveMode = mode === 'done' ? 'done' : 'start';
      renderMoveMode();
    }

    function renderMoveMode() {
      document.querySelectorAll('[data-move-mode]').forEach(btn => btn.classList.toggle('active', btn.dataset.moveMode === state.moveMode));
      document.querySelectorAll('[data-move-section]').forEach(section => section.classList.toggle('hidden', section.dataset.moveSection !== state.moveMode));
    }

    function getLaunchParams() {
      const params = mergedUrlParams();
      return {
        palletNo: params.get('pallet') || params.get('palletNo') || params.get('p') || params.get('qr') || '',
        mode: params.get('mode') || params.get('action') || ''
      };
    }

    function mergedUrlParams() {
      const merged = new URLSearchParams(location.search);
      const liffState = merged.get('liff.state');
      if (liffState) {
        const normalized = liffState.startsWith('?') ? liffState.slice(1) : liffState;
        const stateParams = new URLSearchParams(normalized);
        stateParams.forEach((value, key) => {
          if (!merged.has(key)) merged.set(key, value);
        });
      }
      return merged;
    }

    function applyLaunchAction(action) {
      const palletNo = state.launch.palletNo;
      if (!palletNo) return;
      dismissLaunchPanel();
      if (action === 'inbound') {
        lockActionPallet('inbound', palletNo);
        setTab('inbound');
        renderActionPallet('in');
        renderInboundGrid();
      } else if (action === 'outbound') {
        lockActionPallet('outbound', palletNo);
        focusStoredPalletLocation(palletNo, 'outCooler', 'outLevel', 'outbound');
        setTab('outbound');
        renderActionPallet('out');
        renderOutboundGrid();
      } else {
        const pallet = findPallet(palletNo);
        if (pallet && pallet.status === '仮移動中') {
          lockActionPallet('moveDone', palletNo);
          setMoveMode('done');
        } else {
          lockActionPallet('moveStart', palletNo);
          focusStoredPalletLocation(palletNo, 'moveStartCooler', 'moveStartLevel', 'moveStart');
          setMoveMode('start');
        }
        setTab('move');
        renderActionPallet('moveStart');
        renderActionPallet('moveDone');
        renderMoveStartGrid();
        renderMovingList();
      }
    }

    function lockActionPallet(kind, palletNo) {
      const inputId = actionInputId(kind);
      if (!inputId) return;
      const value = cleanText(palletNo);
      state.lockedPallets[kind] = value;
      $(inputId).value = value;
      renderPalletLocks();
    }

    function unlockActionPallets() {
      state.lockedPallets.inbound = '';
      state.lockedPallets.outbound = '';
      state.lockedPallets.moveStart = '';
      state.lockedPallets.moveDone = '';
      renderPalletLocks();
      renderInboundGrid();
      renderOutboundGrid();
      renderMoveStartGrid();
      renderMoveGrid();
      renderMovingList();
      showToast('パレット固定を解除しました。');
    }

    function renderPalletLocks() {
      [
        ['inbound', 'inPalletNo'],
        ['outbound', 'outPalletNo'],
        ['moveStart', 'moveStartPalletNo'],
        ['moveDone', 'moveDonePalletNo']
      ].forEach(([kind, inputId]) => {
        const locked = !!state.lockedPallets[kind];
        $(inputId).readOnly = locked;
      });
      const hasLockedPallet = Object.values(state.lockedPallets).some(Boolean);
      document.querySelectorAll('[data-unlock-pallet]').forEach(btn => btn.classList.toggle('hidden', !hasLockedPallet));
    }

    function dismissLaunchPanel() {
      $('launchPanel').classList.add('hidden');
    }

    function actionInputId(kind) {
      return {
        inbound: 'inPalletNo',
        outbound: 'outPalletNo',
        moveStart: 'moveStartPalletNo',
        moveDone: 'moveDonePalletNo'
      }[kind] || '';
    }

    function focusStoredPalletLocation(palletNo, coolerSelectId, levelSelectId, selectionKind) {
      const pallet = findPallet(palletNo);
      if (!pallet || !pallet.currentLocationId) {
        showToast('現在の保管場所がないため配置図を自動表示できません。', true);
        return false;
      }
      const location = findLocation(pallet.currentLocationId) || parseLocationId(pallet.currentLocationId);
      if (!location || !location.coolerId) {
        showToast('保管場所IDを読み取れませんでした。', true);
        return false;
      }
      $(coolerSelectId).value = location.coolerId;
      renderLevelOptions(levelSelectId, selectedCooler(coolerSelectId));
      $(levelSelectId).value = String(location.level || 1);
      if (selectionKind && Object.prototype.hasOwnProperty.call(state.selectedLocations, selectionKind)) {
        state.selectedLocations[selectionKind] = pallet.currentLocationId;
      }
      return true;
    }

    function setDefaultYear() {
      $('regYear').value = String(new Date().getFullYear());
    }

    function showLoginScreen(message = '') {
      state.loggedIn = false;
      document.body.classList.add('login-locked');
      $('loginScreen').classList.remove('hidden');
      $('loginMessage').textContent = message;
      renderLoginWorkers();
    }

    async function unlockApp() {
      state.loggedIn = true;
      document.body.classList.remove('login-locked');
      $('loginScreen').classList.add('hidden');
      ensureWorkerSelection();
      renderWorkers();
      await refreshAll();
      if (state.launch.palletNo && state.launch.mode) applyLaunchAction(state.launch.mode);
    }

    async function login() {
      const workerId = $('loginWorkerSelect').value;
      const worker = activeWorkers().find(w => w.workerId === workerId);
      if (!worker) {
        showLoginScreen('作業者を選択してください。');
        return;
      }
      const configuredPin = workerPin(worker);
      const inputPin = cleanText($('loginPin').value);
      if (!configuredPin) {
        $('loginMessage').textContent = 'この作業者にはPINが設定されていません。作業者マスタの備考に PIN:数字 を設定してください。';
        return;
      }
      if (!inputPin) {
        $('loginMessage').textContent = 'PINを入力してください。';
        return;
      }
      if (configuredPin && inputPin !== configuredPin) {
        $('loginMessage').textContent = 'PINが違います。';
        return;
      }
      state.workerId = worker.workerId;
      saveLoginState(worker.workerId);
      $('loginPin').value = '';
      await unlockApp();
    }

    function logout() {
      localStorage.removeItem('garlic.login.v1');
      localStorage.removeItem('garlic.login.v2');
      localStorage.removeItem('garlic.workerId');
      state.workerId = '';
      state.data = null;
      showLoginScreen('ログアウトしました。');
    }

    function restoreLogin() {
      try {
        const saved = JSON.parse(localStorage.getItem('garlic.login.v2') || '{}');
        if (!saved || !saved.workerId) return false;
        const worker = activeWorkers().find(w => w.workerId === saved.workerId);
        if (!worker) return false;
        state.workerId = worker.workerId;
        localStorage.setItem('garlic.workerId', state.workerId);
        return true;
      } catch (error) {
        return false;
      }
    }

    function saveLoginState(workerId) {
      const worker = activeWorkers().find(w => w.workerId === workerId);
      if (!worker) return;
      localStorage.setItem('garlic.workerId', worker.workerId);
      localStorage.setItem('garlic.login.v2', JSON.stringify({
        workerId: worker.workerId,
        workerName: worker.workerName,
        loggedInAt: new Date().toISOString()
      }));
    }

    function workerPin(worker) {
      const note = cleanText(worker && worker.note);
      const match = note.match(/(?:PIN|pin|ＰＩＮ|暗証番号)\s*[:：=]\s*([0-9A-Za-z_-]+)/);
      return match ? match[1] : '';
    }

    function ensureWorkerSelection() {
      const workers = activeWorkers();
      if (!state.workerId || !workers.some(w => w.workerId === state.workerId)) {
        state.workerId = workers[0] ? workers[0].workerId : '';
      }
    }

    function renderWorkers() {
      $('workerSelect').innerHTML = activeWorkers().map(w => `<option value="${esc(w.workerId)}">${esc(w.workerName)}</option>`).join('');
      $('workerSelect').value = state.workerId;
    }

    function renderLoginWorkers() {
      const workers = activeWorkers();
      $('loginWorkerSelect').innerHTML = workers.map(w => `<option value="${esc(w.workerId)}">${esc(w.workerName)}</option>`).join('');
      if (state.workerId && workers.some(w => w.workerId === state.workerId)) $('loginWorkerSelect').value = state.workerId;
    }

    async function refreshWorkersOnly(options = {}) {
      const res = await api('getWorkers');
      state.workers = res && res.master && Array.isArray(res.master.workers) ? res.master.workers : [];
      if (!options.forLogin) ensureWorkerSelection();
      renderLoginWorkers();
      if (!options.forLogin) renderWorkers();
    }

    function renderSelectors() {
      ['inCooler', 'outCooler', 'moveStartCooler', 'moveCooler', 'checkCooler', 'masterCooler'].forEach(id => renderCoolerOptions(id));
      renderLevelOptions('inLevel', selectedCooler('inCooler'));
      renderLevelOptions('outLevel', selectedCooler('outCooler'));
      renderLevelOptions('moveStartLevel', selectedCooler('moveStartCooler'));
      renderLevelOptions('moveLevel', selectedCooler('moveCooler'));
      renderLevelOptions('checkLevel', selectedCooler('checkCooler'));
      renderLevelOptions('masterLevel', selectedCooler('masterCooler'));
      if (!state.masterDraftKey) loadMasterDraft();
    }

    function renderCoolerOptions(id) {
      const select = $(id);
      const previous = select.value;
      const coolers = activeCoolers();
      select.innerHTML = coolers.map(c => `<option value="${esc(c.coolerId)}">${esc(c.coolerName)}（${esc(c.coolerId)}）</option>`).join('');
      if (coolers.some(c => c.coolerId === previous)) select.value = previous;
    }

    function renderLevelOptions(id, cooler) {
      const select = $(id);
      const previous = select.value || '1';
      const max = cooler ? Number(cooler.maxLevel || 1) : 1;
      select.innerHTML = Array.from({ length: max }, (_, i) => `<option value="${i + 1}">${i + 1}段目</option>`).join('');
      select.value = Number(previous) <= max ? previous : '1';
    }

    function renderRegisterTable() {
      $('registeredPalletRows').innerHTML = sortedPallets().map(p => `
        <tr class="selectable-row ${p.palletNo === state.editPalletNo ? 'selected' : ''}" data-edit-pallet="${esc(p.palletNo)}">
          <td>${esc(p.palletNo)}</td>
          <td>${esc(p.status)}</td>
          <td>${num(p.weight)}</td>
          <td>${esc(p.currentLocationName || '')}</td>
          <td>${esc(p.memo || '')}</td>
          <td>
            <button type="button" class="danger small" data-delete-pallet="${esc(p.palletNo)}">削除</button>
          </td>
        </tr>
      `).join('');
      document.querySelectorAll('#registeredPalletRows [data-edit-pallet]').forEach(row => row.addEventListener('click', event => {
        if (event.target.closest('[data-delete-pallet]')) return;
        editPallet(row.dataset.editPallet);
      }));
      document.querySelectorAll('#registeredPalletRows [data-delete-pallet]').forEach(btn => btn.addEventListener('click', event => {
        event.stopPropagation();
        deletePallet(btn.dataset.deletePallet);
      }));
    }

    function addDetailRow(data = {}) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="producer-cell">
            <input data-detail="producerSearch" autocomplete="off" placeholder="名前検索" value="${esc(producerDisplayValue(data.producerNo || ''))}">
            <input data-detail="producerNo" placeholder="生産者番号" value="${esc(data.producerNo || '')}">
            <div class="producer-suggestions hidden" data-producer-suggestions></div>
          </div>
        </td>
        <td><select data-detail="standard">${standardOptions(data.standard || '')}</select></td>
        <td><input data-detail="weight" inputmode="decimal" value="${esc(data.weight || '')}"></td>
        <td><input data-detail="price" inputmode="decimal" value="${esc(data.price || '')}"></td>
        <td><input data-detail="memo" value="${esc(data.memo || '')}"></td>
        <td><button type="button" class="secondary small">削除</button></td>
      `;
      const producerSearch = tr.querySelector('[data-detail="producerSearch"]');
      producerSearch.addEventListener('focus', () => renderProducerSuggestions(tr, producerSearch.value));
      producerSearch.addEventListener('input', event => {
        applyProducerSearch(tr, event.target.value);
        renderProducerSuggestions(tr, event.target.value);
      });
      tr.querySelector('[data-detail="producerNo"]').addEventListener('input', event => {
        const producer = findProducerFromInputCode(event.target.value);
        if (producer) producerSearch.value = producerChoiceDisplay(producer);
      });
      tr.querySelector('[data-detail="weight"]').addEventListener('input', updateRegisterWeight);
      tr.querySelector('button').addEventListener('click', () => {
        tr.remove();
        updateRegisterWeight();
      });
      $('detailRows').appendChild(tr);
      updateRegisterWeight();
    }

    function standardOptions(selected) {
      return activeStandards().map(s => `<option value="${esc(s.standardName)}" ${s.standardName === selected ? 'selected' : ''}>${esc(s.standardName)}</option>`).join('');
    }

    function renderProducerOptions() {
      const list = $('producerOptions');
      if (!list) return;
      list.innerHTML = activeProducers()
        .map(p => `<option value="${esc(producerChoiceDisplay(p))}"></option>`)
        .join('');
    }

    function producerDisplayValue(producerNo) {
      const producer = findProducerFromInputCode(producerNo) || findProducer(producerNo);
      return producer ? producerChoiceDisplay(producer) : cleanText(producerNo);
    }

    function applyProducerSearch(row, value) {
      const producer = findProducerByDisplay(value);
      if (producer) row.querySelector('[data-detail="producerNo"]').value = buildStoredProducerNo(producer);
    }

    function renderProducerSuggestions(row, value) {
      closeProducerSuggestions(row);
      const box = row.querySelector('[data-producer-suggestions]');
      if (!box) return;
      const query = cleanText(value).toLowerCase();
      const producers = activeProducers()
        .filter(p => {
          if (!query) return true;
          return producerSearchText(p).toLowerCase().includes(query);
        })
        .slice(0, 60);
      if (!producers.length) {
        box.innerHTML = '<div class="producer-no-match">該当なし</div>';
      } else {
        box.innerHTML = producers.map(p => `
          <button type="button" class="producer-option" data-producer-pick="${esc(p.producerNo)}" data-producer-source="${esc(p.producerSource)}">
            <span class="producer-name">${esc(p.producerName || '(名称なし)')}</span>
          </button>
        `).join('');
      }
      box.classList.remove('hidden');
      box.querySelectorAll('[data-producer-pick]').forEach(btn => {
        btn.addEventListener('pointerdown', event => {
          event.preventDefault();
          selectProducer(row, btn.dataset.producerPick, btn.dataset.producerSource);
        });
        btn.addEventListener('click', event => {
          event.preventDefault();
          selectProducer(row, btn.dataset.producerPick, btn.dataset.producerSource);
        });
      });
    }

    function selectProducer(row, producerNo, sourceHint = '') {
      const producer = findProducer(producerNo, sourceHint);
      if (!producer) return;
      row.querySelector('[data-detail="producerSearch"]').value = producerChoiceDisplay(producer);
      row.querySelector('[data-detail="producerNo"]').value = buildStoredProducerNo(producer);
      closeProducerSuggestions();
    }

    function closeProducerSuggestions(exceptRow = null) {
      document.querySelectorAll('[data-producer-suggestions]').forEach(box => {
        if (exceptRow && exceptRow.contains(box)) return;
        box.classList.add('hidden');
      });
    }

    function findProducerByDisplay(value) {
      const text = cleanText(value);
      if (!text) return null;
      const lower = text.toLowerCase();
      return activeProducers().find(p => {
        const values = [
          producerChoiceDisplay(p),
          producerOptionCode(p),
          p.producerNo,
          p.producerName,
          p.producerDisplayNo,
          buildStoredProducerNo(p)
        ];
        return values.some(v => cleanText(v) === text) || producerSearchText(p).toLowerCase() === lower;
      }) || null;
    }

    function clearRegisterForm() {
      state.editPalletNo = '';
      $('registerTitle').textContent = 'パレット登録';
      $('savePalletBtn').textContent = '登録';
      $('regPalletNo').disabled = false;
      $('regPalletNo').value = '';
      $('regStatus').value = '未配置';
      $('regStatus').disabled = true;
      $('regWeight').value = '';
      $('regMemo').value = '';
      setDefaultYear();
      $('detailRows').innerHTML = '';
      addDetailRow();
    }

    function editPallet(palletNo) {
      const pallet = findPallet(palletNo);
      if (!pallet) return;
      state.editPalletNo = palletNo;
      $('registerTitle').textContent = `パレット編集 ${palletNo}`;
      $('savePalletBtn').textContent = '変更保存';
      $('regYear').value = pallet.productionYear || String(new Date().getFullYear());
      $('regPalletNo').value = pallet.palletNo;
      $('regPalletNo').disabled = true;
      $('regStatus').value = pallet.status || '未配置';
      $('regStatus').disabled = false;
      $('regWeight').value = pallet.weight || '';
      $('regMemo').value = pallet.memo || '';
      $('detailRows').innerHTML = '';
      detailsFor(palletNo).forEach(addDetailRow);
      if (!$('detailRows').children.length) addDetailRow();
      renderRegisterTable();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function savePallet() {
      try {
        const productionYear = cleanText($('regYear').value);
        const palletNo = state.editPalletNo
          ? state.editPalletNo
          : (cleanText($('regPalletNo').value) || nextPalletNo(productionYear));
        if (!state.editPalletNo && !cleanText($('regPalletNo').value)) $('regPalletNo').value = palletNo;
        const payload = {
          productionYear,
          palletNo,
          weight: $('regWeight').value,
          status: state.editPalletNo ? $('regStatus').value : '未配置',
          memo: $('regMemo').value,
          details: collectDetails()
        };
        const method = state.editPalletNo ? 'updatePallet' : 'registerPallet';
        const res = await api(method, payload);
        applyDataResponse(res);
        clearRegisterForm();
      } catch (error) {
        showToast(error.message, true);
      }
    }

    function nextPalletNo(productionYear) {
      const year = cleanText(productionYear);
      if (!/^\d{4}$/.test(year)) throw new Error('年産を4桁で入力してください。');
      const maxSerial = (state.data ? state.data.pallets : [])
        .filter(p => String(p.productionYear) === year)
        .reduce((max, p) => Math.max(max, Number(p.serialNo || palletSerialFromNo(p.palletNo) || 0)), 0);
      return `${year}-${String(maxSerial + 1).padStart(4, '0')}`;
    }

    function collectDetails() {
      updateRegisterWeight();
      return Array.from($('detailRows').querySelectorAll('tr')).map(tr => ({
        producerNo: normalizeProducerNoForSave(tr.querySelector('[data-detail="producerNo"]').value),
        standard: tr.querySelector('[data-detail="standard"]').value,
        weight: tr.querySelector('[data-detail="weight"]').value,
        price: tr.querySelector('[data-detail="price"]').value,
        memo: tr.querySelector('[data-detail="memo"]').value
      })).filter(r => r.producerNo || r.standard || r.weight || r.price || r.memo);
    }

    function updateRegisterWeight() {
      const total = Array.from($('detailRows').querySelectorAll('[data-detail="weight"]'))
        .reduce((sum, input) => sum + parseInputNumber(input.value), 0);
      $('regWeight').value = total ? formatInputNumber(total) : '';
    }

    function parseInputNumber(value) {
      const n = Number(String(value || '').replace(/,/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function formatInputNumber(value) {
      return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(3)));
    }

    async function deletePallet(palletNo) {
      if (!confirm(`${palletNo} を削除しますか。`)) return;
      try {
        const res = await api('deletePallet', { palletNo });
        applyDataResponse(res);
      } catch (error) {
        showToast(error.message, true);
      }
    }

    function renderQrChoices() {
      closePalletSuggestions();
    }

    function renderPalletSuggestions(inputId, side) {
      closePalletSuggestions(inputId);
      const input = $(inputId);
      const box = input.closest('.pallet-pick-field').querySelector('[data-pallet-suggestions]');
      const query = cleanText(input.value).toLowerCase();
      const pallets = sortedPallets()
        .filter(p => {
          if (!query) return true;
          return `${p.palletNo} ${p.status} ${p.currentLocationName || ''}`.toLowerCase().includes(query);
        })
        .slice(0, 80);
      if (!pallets.length) {
        box.innerHTML = '<div class="producer-no-match">該当なし</div>';
      } else {
        box.innerHTML = pallets.map(p => `
          <button type="button" class="pallet-option" data-pallet-pick="${esc(p.palletNo)}">
            <span class="pallet-option-main">${esc(p.palletNo)}</span>
            <span class="pallet-option-sub">${esc(p.status)} / ${num(p.weight)}kg${p.currentLocationName ? ` / ${esc(p.currentLocationName)}` : ''}</span>
          </button>
        `).join('');
      }
      box.classList.remove('hidden');
      box.querySelectorAll('[data-pallet-pick]').forEach(btn => {
        btn.addEventListener('pointerdown', event => {
          event.preventDefault();
          selectQrPallet(inputId, side, btn.dataset.palletPick);
        });
        btn.addEventListener('click', event => {
          event.preventDefault();
          selectQrPallet(inputId, side, btn.dataset.palletPick);
        });
      });
    }

    function selectQrPallet(inputId, side, palletNo) {
      $(inputId).value = palletNo;
      state.qrPrint[side] = palletNo;
      renderPrintArea();
      closePalletSuggestions();
    }

    function closePalletSuggestions(exceptInputId = '') {
      document.querySelectorAll('[data-pallet-suggestions]').forEach(box => {
        if (exceptInputId && $(exceptInputId).closest('.pallet-pick-field').contains(box)) return;
        box.classList.add('hidden');
      });
    }

    function renderPrintArea() {
      const left = findPallet(state.qrPrint.left || $('qrLeftNo').value);
      const right = findPallet(state.qrPrint.right || $('qrRightNo').value);
      const labels = [];
      for (let row = 0; row < 3; row++) {
        labels.push(left ? qrLabelHtml(left) : '<div class="qr-label blank"></div>');
        labels.push(right ? qrLabelHtml(right) : '<div class="qr-label blank"></div>');
      }
      $('printArea').innerHTML = labels.join('');
    }

    function qrLabelHtml(pallet) {
      const details = detailsFor(pallet.palletNo);
      return `
        <div class="qr-label">
          <div class="qr-code">${qrSvg(qrLaunchUrl(pallet.palletNo))}</div>
          <div class="qr-meta">
            <div class="qr-title-line">
              <div class="pallet-no">${esc(pallet.palletNo)}</div>
              <div class="qr-date">${esc(formatReiwaDate(new Date()))}</div>
            </div>
            <div>重量 ${num(pallet.weight)}kg</div>
            ${details.length ? detailMiniTable(details) : '<div>明細なし</div>'}
          </div>
        </div>
      `;
    }

    function qrLaunchUrl(palletNo) {
      const url = new URL(APP_HOME_URL);
      url.searchParams.set('p', palletNo);
      return url.toString();

    function detailMiniTable(details) {
      return `<table class="detail-mini"><thead><tr><th>生産者</th><th>規格</th><th>重量</th><th>価格</th></tr></thead><tbody>${
        details.map(d => `<tr><td>${esc(qrProducerLabel(d))}</td><td>${esc(d.standard)}</td><td>${num(d.weight)}</td><td>${num(d.price)}</td></tr>`).join('')
      }</tbody></table>`;
    }

    function qrSvg(text) {
      if (!window.qrcode) return `<div>${esc(text)}</div>`;
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      return qr.createSvgTag(5, 1);
    }

    function formatReiwaDate(date) {
      const year = date.getFullYear();
      const reiwa = year - 2018;
      return `令和${reiwa}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function renderInboundGrid() {
      renderSelectableGrid('inGrid', selectedCooler('inCooler'), Number($('inLevel').value || 1), 'inbound');
    }

    function renderMoveGrid() {
      renderSelectableGrid('moveGrid', selectedCooler('moveCooler'), Number($('moveLevel').value || 1), 'move');
    }

    function renderOutboundGrid() {
      renderRemovalGrid('outGrid', selectedCooler('outCooler'), Number($('outLevel').value || 1), 'outbound');
    }

    function renderMoveStartGrid() {
      renderRemovalGrid('moveStartGrid', selectedCooler('moveStartCooler'), Number($('moveStartLevel').value || 1), 'moveStart');
    }

    function setGridWithCoordinates(container, cooler, cells) {
      const colCount = Number(cooler.colCount || 0);
      const rowCount = Number(cooler.rowCount || 0);
      container.style.gridTemplateColumns = `42px repeat(${colCount}, minmax(78px, 1fr))`;
      const html = ['<div class="grid-axis-corner">行/列</div>'];
      for (let col = 1; col <= colCount; col++) {
        html.push(`<div class="grid-col-label">${col}</div>`);
      }
      for (let row = 1; row <= rowCount; row++) {
        html.push(`<div class="grid-row-label">${row}</div>`);
        for (let col = 1; col <= colCount; col++) {
          html.push(cells[(row - 1) * colCount + col - 1] || '');
        }
      }
      container.innerHTML = html.join('');
    }

    function renderSelectableGrid(containerId, cooler, level, kind) {
      const container = $(containerId);
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const placement = placementByLocation();
      const locations = locationMatrix(cooler, level);
      const cells = locations.map(loc => {
        const placed = placement[loc.locationId];
        const selected = state.selectedLocations[kind] === loc.locationId;
        const support = stackSupport(loc, placement);
        const canSelect = !!loc.available && !placed && support.ok;
        const cls = !loc.available ? 'unavailable' : placed ? 'used' : !support.ok ? 'stack-blocked' : selected ? 'selected' : 'available';
        const label = !loc.available ? '使用不可' : placed ? placed.palletNo : '空き';
        const sub = placed ? '使用済み' : !loc.available ? (loc.note || '') : support.message;
        return `<button type="button" class="cell ${cls}" data-location="${esc(loc.locationId)}" ${canSelect ? '' : 'disabled'}>${esc(label)}${sub ? `<span class="sub">${esc(sub)}</span>` : ''}</button>`;
      });
      setGridWithCoordinates(container, cooler, cells);
      container.querySelectorAll('[data-location]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedLocations[kind] = btn.dataset.location;
        kind === 'inbound' ? renderInboundGrid() : renderMoveGrid();
      }));
    }

    function renderRemovalGrid(containerId, cooler, level, kind) {
      const container = $(containerId);
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const placement = placementByLocation();
      const locations = locationMatrix(cooler, level);
      const inputId = kind === 'outbound' ? 'outPalletNo' : 'moveStartPalletNo';
      const currentPalletNo = $(inputId).value.trim();
      const lockedPalletNo = state.lockedPallets[kind] || '';
      const cells = locations.map(loc => {
        const placed = placement[loc.locationId];
        const lockedTarget = !!lockedPalletNo && placed && placed.palletNo === lockedPalletNo;
        const selected = state.selectedLocations[kind] === loc.locationId || (placed && placed.palletNo === currentPalletNo);
        const upper = upperClear(loc, placement, cooler);
        const matchesLock = !lockedPalletNo || lockedTarget;
        const canSelect = !!loc.available && !!placed && upper.ok && matchesLock;
        const cls = [
          !loc.available ? 'unavailable' : !placed ? 'available' : !upper.ok ? 'stack-blocked' : selected ? 'selected' : 'removable',
          lockedTarget ? 'locked-target' : ''
        ].filter(Boolean).join(' ');
        const label = !loc.available ? '使用不可' : placed ? placed.palletNo : '空き';
        const sub = !loc.available ? (loc.note || '') : placed ? (upper.message || '出庫可能') : '';
        return `<button type="button" class="cell ${cls}" data-remove-location="${esc(loc.locationId)}" data-remove-pallet="${esc(placed ? placed.palletNo : '')}" ${canSelect ? '' : 'disabled'}>${esc(label)}${sub ? `<span class="sub">${esc(sub)}</span>` : ''}</button>`;
      });
      setGridWithCoordinates(container, cooler, cells);
      container.querySelectorAll('[data-remove-location]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedLocations[kind] = btn.dataset.removeLocation;
        $(inputId).value = btn.dataset.removePallet || '';
        renderActionPallet(kind === 'outbound' ? 'out' : 'moveStart');
        kind === 'outbound' ? renderOutboundGrid() : renderMoveStartGrid();
      }));
    }

    function stackSupport(loc, placement) {
      const level = Number(loc.level || 1);
      if (level <= 1) return { ok: true, message: '' };
      const lowerId = makeLocationId(loc.coolerId, level - 1, loc.row, loc.col);
      const lowerLocation = state.data.master.locations.find(item => item.locationId === lowerId);
      if (!lowerLocation || !lowerLocation.available) {
        return { ok: false, message: `${level - 1}段目が使用不可` };
      }
      if (!placement[lowerId]) {
        return { ok: false, message: `${level - 1}段目にパレットが必要` };
      }
      return { ok: true, message: `${level - 1}段目あり` };
    }

    function upperClear(loc, placement, cooler) {
      const level = Number(loc.level || 1);
      const maxLevel = Number(cooler && cooler.maxLevel || 1);
      if (level >= maxLevel) return { ok: true, message: '上段なし' };
      const upperId = makeLocationId(loc.coolerId, level + 1, loc.row, loc.col);
      const upperLocation = state.data.master.locations.find(item => item.locationId === upperId);
      if (!upperLocation || !upperLocation.available) return { ok: true, message: `${level + 1}段目使用不可` };
      if (placement[upperId]) return { ok: false, message: `${level + 1}段目あり` };
      return { ok: true, message: `${level + 1}段目空き` };
    }

    function renderMovingList() {
      const container = $('movingList');
      const moving = state.data && state.data.moving ? state.data.moving : [];
      if (!moving.length) {
        container.innerHTML = '<div class="notice">仮移動中のパレットはありません。</div>';
        return;
      }
      const current = $('moveDonePalletNo').value.trim();
      const lockedPalletNo = state.lockedPallets.moveDone || '';
      container.innerHTML = moving.map(item => {
        const selected = item.palletNo === current;
        const lockedTarget = !!lockedPalletNo && item.palletNo === lockedPalletNo;
        const disabled = !!lockedPalletNo && !lockedTarget;
        const pallet = findPallet(item.palletNo);
        const from = item.fromLocationName || item.fromLocationId || '';
        const weight = pallet ? `${num(pallet.weight)}kg` : '';
        return `<button type="button" class="moving-item ${selected || lockedTarget ? 'selected' : ''}" data-moving-pallet="${esc(item.palletNo)}" ${disabled ? 'disabled' : ''}>
          <strong>${esc(item.palletNo)}</strong>
          <span class="sub">${esc([from, weight].filter(Boolean).join(' / '))}</span>
        </button>`;
      }).join('');
      container.querySelectorAll('[data-moving-pallet]').forEach(btn => btn.addEventListener('click', () => {
        $('moveDonePalletNo').value = btn.dataset.movingPallet;
        renderActionPallet('moveDone');
        renderMovingList();
      }));
    }

    function renderCheckGrid() {
      const cooler = selectedCooler('checkCooler');
      const level = Number($('checkLevel').value || 1);
      const container = $('checkGrid');
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const placement = placementByLocation();
      const locations = locationMatrix(cooler, level);
      const cells = locations.map(loc => {
        const placed = placement[loc.locationId];
        const selected = placed && placed.palletNo === state.inventorySelectedPalletNo;
        const cls = !loc.available ? 'unavailable' : placed ? (selected ? 'selected' : 'used') : 'available';
        const label = placed ? placed.palletNo : loc.available ? '空き' : '使用不可';
        const producerNos = placed ? producerNosForPallet(placed.palletNo) : '';
        return `<button type="button" class="cell ${cls}" data-check-pallet="${esc(placed ? placed.palletNo : '')}" ${placed ? '' : 'disabled'}>${esc(label)}${producerNos ? `<span class="sub">${esc(producerNos)}</span>` : ''}</button>`;
      });
      setGridWithCoordinates(container, cooler, cells);
      container.querySelectorAll('[data-check-pallet]').forEach(btn => btn.addEventListener('click', () => {
        state.inventorySelectedPalletNo = btn.dataset.checkPallet || '';
        renderCheckGrid();
        renderInventoryRows();
        renderInventoryPallet();
      }));
    }

    function renderActionPallet(kind) {
      const map = {
        in: ['inPalletNo', 'inPalletSummary'],
        out: ['outPalletNo', 'outPalletSummary'],
        moveStart: ['moveStartPalletNo', 'moveStartSummary'],
        moveDone: ['moveDonePalletNo', 'moveDoneSummary']
      };
      const [inputId, summaryId] = map[kind];
      const pallet = findPallet($(inputId).value.trim());
      const el = $(summaryId);
      if (!pallet) {
        el.classList.add('hidden');
        el.innerHTML = '';
        return;
      }
      el.classList.remove('hidden');
      el.innerHTML = palletSummaryHtml(pallet);
    }

    function palletSummaryHtml(pallet) {
      const details = detailsFor(pallet.palletNo);
      return `
        <div><strong>${esc(pallet.palletNo)}</strong> / ${esc(pallet.status)} / ${num(pallet.weight)}kg</div>
        <div>保管: ${esc(currentStorageLabel(pallet))}</div>
        <div>備考: ${esc(pallet.memo || '')}</div>
        ${details.length ? detailSummaryTable(details) : '<div class="muted">明細なし</div>'}
      `;
    }

    function detailSummaryTable(details) {
      return `<table class="summary-detail"><thead><tr><th>生産者</th><th>規格</th><th>重量</th><th>価格</th><th>備考</th></tr></thead><tbody>${
        details.map(d => `<tr><td>${esc(producerLabel(d))}</td><td>${esc(d.standard)}</td><td>${num(d.weight)}</td><td>${num(d.price)}</td><td>${esc(d.memo || '')}</td></tr>`).join('')
      }</tbody></table>`;
    }

        state.selectedLocations.inbound = '';

        showToast(error.message, true);
      }

        });
        applyDataResponse(res);
        $('moveDonePalletNo').value = '';
        $('moveDoneMemo').value = '';
        state.selectedLocations.move = '';
        state.lockedPallets.moveDone = '';

    function renderInventoryRows() {
      const q = $('searchPallet').value.trim();
      const rows = inventoryFilteredPallets(q);
      if (state.inventorySelectedPalletNo && !rows.some(p => p.palletNo === state.inventorySelectedPalletNo)) state.inventorySelectedPalletNo = '';
      $('inventoryRows').innerHTML = rows.map(p => `
        <tr class="selectable-row ${p.palletNo === state.inventorySelectedPalletNo ? 'selected' : ''}" data-inventory-pallet="${esc(p.palletNo)}"><td>${esc(p.palletNo)}</td><td>${esc(p.status)}</td><td>${num(p.weight)}</td><td>${esc(currentStorageLabel(p))}</td><td>${esc(p.registeredAt || '')}</td></tr>
      `).join('');
      document.querySelectorAll('[data-inventory-pallet]').forEach(row => row.addEventListener('click', () => {
        focusInventoryPallet(row.dataset.inventoryPallet, false);
      }));
    }

    function inventoryFilteredPallets(query) {
      const q = cleanText(query);
      return sortedPallets().filter(p => !q || p.palletNo.includes(q));
    }

    function handleInventorySearch() {
      const q = cleanText($('searchPallet').value);
      const rows = inventoryFilteredPallets(q);
      const exact = q ? findPallet(q) : null;
      const target = exact || (q && rows.length === 1 ? rows[0] : null);
      if (target) {
        focusInventoryPallet(target.palletNo, false);
        return;
      }
      if (!q) state.inventorySelectedPalletNo = '';
      renderCheckGrid();
      renderInventoryRows();
      renderInventoryPallet();
    }

    function focusInventoryPallet(palletNo, updateSearch) {
      const pallet = findPallet(palletNo);
      if (!pallet) return;
      state.inventorySelectedPalletNo = pallet.palletNo;
      if (updateSearch) $('searchPallet').value = pallet.palletNo;
      if (pallet.currentLocationId) focusStoredPalletLocation(pallet.palletNo, 'checkCooler', 'checkLevel', '');
      renderCheckGrid();
      renderInventoryRows();
      renderInventoryPallet();
    }

    function renderInventoryPallet() {
      const el = $('checkPalletSummary');
      const pallet = findPallet(state.inventorySelectedPalletNo);
      if (!pallet) {
        el.classList.add('hidden');
        el.innerHTML = '';
        return;
      }
      el.classList.remove('hidden');
      el.innerHTML = palletSummaryHtml(pallet);
    }

    function renderSearch() {
      if (!state.data) return;
      const rows = searchDetailRows();
      const producerGroups = groupSearchRows(rows, row => `${row.producerText}|${row.standard}`, row => ({
        title: row.producerText || '(生産者なし)',
        standard: row.standard || '(規格なし)'
      })).sort((a, b) => a.title.localeCompare(b.title, 'ja') || a.standard.localeCompare(b.standard, 'ja'));
      const coolerGroups = groupSearchRows(rows.filter(row => row.location), row => `${row.coolerName}|${row.standard}`, row => ({
        title: row.coolerName || '(冷蔵庫なし)',
        standard: row.standard || '(規格なし)'
      })).sort((a, b) => a.title.localeCompare(b.title, 'ja') || a.standard.localeCompare(b.standard, 'ja'));
      renderSearchGroups($('producerSearchGroups'), producerGroups, 'producer');
      renderSearchGroups($('coolerSearchGroups'), coolerGroups, 'cooler');
    }

    function searchDetailRows() {
      const query = cleanText($('searchQuery').value).toLowerCase();
      return (state.data.details || []).map(detail => {
        const pallet = findPallet(detail.palletNo) || {};
        const location = pallet.currentLocationId ? (findLocation(pallet.currentLocationId) || parseLocationId(pallet.currentLocationId)) : null;
        const cooler = location ? activeCoolers().find(c => c.coolerId === location.coolerId) : null;
        const producerText = producerLabel(detail) || '(生産者なし)';
        const storageLabel = currentStorageDetailLabel(pallet);
        const row = {
          ...detail,
          pallet,
          palletStatus: pallet.status || '',
          storageLabel,
          location,
          coolerName: cooler ? cooler.coolerName : (location ? location.coolerId : ''),
          producerText
        };
        row.searchText = [
          row.palletNo,
          row.palletStatus,
          row.producerNo,
          row.producerName,
          producerText,
          row.standard,
          storageLabel,
          row.coolerName
        ].filter(Boolean).join(' ').toLowerCase();
        return row;
      }).filter(row => !query || row.searchText.includes(query))
        .sort((a, b) => a.producerText.localeCompare(b.producerText, 'ja')
          || a.standard.localeCompare(b.standard, 'ja')
          || a.palletNo.localeCompare(b.palletNo, 'ja')
          || a.detailNo - b.detailNo);
    }

    function groupSearchRows(rows, keyFn, metaFn) {
      const groups = new Map();
      rows.forEach(row => {
        const key = keyFn(row);
        if (!groups.has(key)) {
          groups.set(key, {
            ...metaFn(row),
            weight: 0,
            price: 0,
            rows: [],
            storageList: new Set(),
            producerList: new Set()
          });
        }
        const group = groups.get(key);
        group.weight += Number(row.weight || 0);
        group.price += Number(row.price || 0);
        group.rows.push(row);
        if (row.storageLabel) group.storageList.add(row.storageLabel);
        if (row.producerText) group.producerList.add(row.producerText);
      });
      return Array.from(groups.values()).map(group => ({
        ...group,
        storageList: Array.from(group.storageList),
        producerList: Array.from(group.producerList)
      }));
    }

    function renderSearchGroups(container, groups, mode) {
      if (!groups.length) {
        container.innerHTML = '<div class="search-empty">該当する明細がありません。</div>';
        return;
      }
      container.innerHTML = groups.map(group => {
        const tailLabel = mode === 'producer' ? '保管場所' : '生産者';
        const tailItems = mode === 'producer' ? group.storageList : group.producerList;
        return `<details class="search-group">
          <summary>
            <span><span class="search-summary-label">${mode === 'producer' ? '生産者' : '冷蔵庫'}</span>${esc(group.title)}</span>
            <span><span class="search-summary-label">規格</span>${esc(group.standard)}</span>
            <span><span class="search-summary-label">重量</span>${num(group.weight)}kg</span>
            <span><span class="search-summary-label">価格</span>${num(group.price)}</span>
            <span><span class="search-summary-label">${tailLabel} / ${group.rows.length}件</span>${esc(compactList(tailItems))}</span>
          </summary>
          ${searchDetailTable(group.rows)}
        </details>`;
      }).join('');
      bindSearchDetailActions(container);
    }

    function searchDetailTable(rows) {
      return `<div class="search-detail-table"><table>
        <thead><tr><th>パレット</th><th>状態</th><th>保管場所</th><th>生産者</th><th>規格</th><th>重量</th><th>価格</th><th>操作</th></tr></thead>
        <tbody>${rows.map(row => `
          <tr data-search-pallet="${esc(row.palletNo)}">
            <td>${esc(row.palletNo)}</td>
            <td>${esc(row.palletStatus)}</td>
            <td>${esc(row.storageLabel)}</td>
            <td>${esc(row.producerText)}</td>
            <td>${esc(row.standard)}</td>
            <td>${num(row.weight)}</td>
            <td>${num(row.price)}</td>
            <td>
              <button type="button" class="secondary small" data-search-inventory="${esc(row.palletNo)}">配置確認</button>
              <button type="button" class="secondary small" data-search-outbound="${esc(row.palletNo)}" ${row.location ? '' : 'disabled'}>出庫</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table></div>`;
    }

    function bindSearchDetailActions(container) {
      container.querySelectorAll('[data-search-pallet]').forEach(row => row.addEventListener('click', event => {
        if (event.target.closest('button')) return;
        openSearchPallet(row.dataset.searchPallet, 'inventory');
      }));
      container.querySelectorAll('[data-search-inventory]').forEach(btn => btn.addEventListener('click', event => {
        event.stopPropagation();
        openSearchPallet(btn.dataset.searchInventory, 'inventory');
      }));
      container.querySelectorAll('[data-search-outbound]').forEach(btn => btn.addEventListener('click', event => {
        event.stopPropagation();
        openSearchPallet(btn.dataset.searchOutbound, 'outbound');
      }));
    }

    function openSearchPallet(palletNo, target) {
      const pallet = findPallet(palletNo);
      if (!pallet) return;
      dismissLaunchPanel();
      if (target === 'outbound') {
        setTab('outbound');
        $('outPalletNo').value = pallet.palletNo;
        state.selectedLocations.outbound = '';
        state.lockedPallets.outbound = '';
        renderPalletLocks();
        if (pallet.currentLocationId) focusStoredPalletLocation(pallet.palletNo, 'outCooler', 'outLevel', 'outbound');
        else showToast('現在の保管場所がないため出庫画面でハイライトできません。', true);
        renderActionPallet('out');
        renderOutboundGrid();
        $('outboundPanel').scrollIntoView({ block: 'start' });
        return;
      }
      setTab('inventory');
      $('searchPallet').value = pallet.palletNo;
      focusInventoryPallet(pallet.palletNo, true);
      $('inventoryPanel').scrollIntoView({ block: 'start' });
    }

    function compactList(items, limit = 3) {
      const values = [...new Set((items || []).map(cleanText).filter(Boolean))];
      if (!values.length) return '';
      if (values.length <= limit) return values.join(' / ');
      return `${values.slice(0, limit).join(' / ')} 他${values.length - limit}件`;
    }

    function renderMaster() {
      renderStandardRows();
      renderCoolerRows();
      renderWorkerRows();
      renderProducerSettings();
      renderHistoryRows();
      renderMasterGrid();
    }

    function renderStandardRows() {
      $('standardRows').innerHTML = state.data.master.standards.map(row => standardRowHtml(row)).join('');
      bindRemoveButtons('standardRows');
    }

    function standardRowHtml(row = {}) {
      return `<tr>
        <td><input data-field="standardId" value="${esc(row.standardId || '')}"></td>
        <td><input data-field="standardName" value="${esc(row.standardName || '')}"></td>
        <td><input data-field="displayOrder" inputmode="numeric" value="${esc(row.displayOrder || '')}"></td>
        <td><input data-field="active" type="checkbox" ${row.active !== false ? 'checked' : ''}></td>
        <td><button type="button" class="secondary small" data-remove-row>削除</button></td>
      </tr>`;

      state.masterDraftKey = `${cooler.coolerId}:${level}`;

    function renderMasterGrid() {
      const cooler = selectedCooler('masterCooler');
      const level = Number($('masterLevel').value || 1);
      const container = $('masterGrid');
      if (!cooler) {
        container.innerHTML = '<div class="notice warn">冷蔵庫マスタに有効な冷蔵庫がありません。</div>';
        return;
      }
      const key = `${cooler.coolerId}:${level}`;
      if (state.masterDraftKey !== key) loadMasterDraft();
      const placement = placementByLocation();
      const cells = [];
      for (let row = 1; row <= Number(cooler.rowCount); row++) {
        for (let col = 1; col <= Number(cooler.colCount); col++) {
          const locId = makeLocationId(cooler.coolerId, level, row, col);
          const unavailable = state.masterUnavailable.has(`${row}-${col}`);
          const placed = placement[locId];
          const cls = placed ? 'used' : unavailable ? 'unavailable' : 'available';
          const label = placed ? placed.palletNo : unavailable ? '使用不可' : '使用可';
          cells.push(`<button type="button" class="cell ${cls}" data-master-cell="${row}-${col}" ${placed ? 'disabled' : ''}>${esc(label)}<span class="sub">R${String(row).padStart(2, '0')}-C${String(col).padStart(2, '0')}</span></button>`);
        }
      }
      setGridWithCoordinates(container, cooler, cells);
      container.querySelectorAll('[data-master-cell]').forEach(btn => btn.addEventListener('click', () => {
        const key = btn.dataset.masterCell;
        if (state.masterUnavailable.has(key)) state.masterUnavailable.delete(key);

        renderMasterGrid();
      }));

    async function api(method, payload = {}) {
      if (!state.loggedIn && !['getWorkers', 'ping'].includes(method)) {
        throw new Error('ログインしてください。');
      }
      switch (method) {
        case 'ping':
          return supabaseRpc('ping_write_api');
        case 'getWorkers':
          return getSupabaseWorkersData();
        case 'getAppData':
          return getSupabaseAppData();
        case 'registerPallet':
        case 'updatePallet':
          return writeAndRefresh('upsert_pallet', {
            p_payload: {
              workerId: state.workerId,
              palletNo: payload.palletNo,
              cropYear: payload.productionYear,
              serialNo: palletSerialFromNo(payload.palletNo),
              status: payload.status,
              memo: payload.memo,
              details: payload.details || []
            }
          });
        case 'deletePallet':
          return writeAndRefresh('delete_pallet_rpc', {
            p_worker_id: state.workerId,
            p_pallet_no: payload.palletNo,
            p_memo: payload.memo || ''
          });
        case 'recordInbound':
          return writeAndRefresh('record_inbound', {
            p_worker_id: state.workerId,
            p_pallet_no: payload.palletNo,
            p_location_id: payload.locationId,
            p_memo: payload.memo || ''
          });
        case 'recordOutbound':
          return writeAndRefresh('record_outbound', {
            p_worker_id: state.workerId,
            p_pallet_no: payload.palletNo,
            p_memo: payload.memo || ''
          });
        case 'startMove':
          return writeAndRefresh('start_move', {
            p_worker_id: state.workerId,
            p_pallet_no: payload.palletNo,
            p_memo: payload.memo || ''
          });
        case 'completeMove':
          return writeAndRefresh('complete_move', {
            p_worker_id: state.workerId,
            p_pallet_no: payload.palletNo,
            p_location_id: payload.locationId,
            p_memo: payload.memo || ''
          });
        case 'saveProducerSettings':
          return writeAndRefresh('save_app_setting', {
            p_worker_id: state.workerId,
            p_setting_key: 'producer_import_source',
            p_setting_value: payload
          });
        case 'saveStandards':
          return writeAndRefresh('save_standards', {
            p_worker_id: state.workerId,
            p_rows: payload.rows || []
          });
        case 'saveCoolers':
          return writeAndRefresh('save_coolers', {
            p_worker_id: state.workerId,
            p_rows: payload.rows || []
          });
        case 'saveLocationGrid':
          return writeAndRefresh('save_location_grid', {
            p_worker_id: state.workerId,
            p_cooler_id: payload.coolerId,
            p_level_no: payload.level,
            p_cells: payload.cells || []
          });
        case 'saveWorkers':
          return writeAndRefresh('save_workers', {
            p_worker_id: state.workerId,
            p_rows: payload.rows || []
          });
        default:
          throw new Error(`未対応のAPIです: ${method || '(空)'}`);
      }
    }

    async function writeAndRefresh(fn, args) {
      const result = await supabaseRpc(fn, args);
      const fresh = await getSupabaseAppData();
      return Object.assign({ ok: true, message: '保存しました。' }, fresh, result || {});
    }

    async function supabaseRpc(fn, args = {}) {
      const { data, error } = await supabaseClient.rpc(fn, args);
      if (error) throw new Error(error.message);
      if (data && data.ok === false) throw new Error(data.error || 'APIエラーです。');
      return data || { ok: true };
    }

    async function getSupabaseWorkersData() {
      const workers = await selectAll('workers', query => query.order('display_order', { ascending: true }).order('worker_id', { ascending: true }));
      return {
        ok: true,
        master: {
          workers: workers.map(mapWorker)
        }
      };
    }

    async function getSupabaseAppData() {
      const [
        workers,
        standards,
        coolers,
        locations,
        producers,
        pallets,
        details,
        placements,
        moving,
        appSettings
      ] = await Promise.all([
        selectAll('workers', query => query.order('display_order', { ascending: true }).order('worker_id', { ascending: true })),
        selectAll('standards', query => query.order('display_order', { ascending: true }).order('standard_id', { ascending: true })),
        selectAll('coolers', query => query.order('cooler_id', { ascending: true })),
        selectAll('locations', query => query.order('cooler_id', { ascending: true }).order('level_no', { ascending: true }).order('row_no', { ascending: true }).order('col_no', { ascending: true })),
        selectAll('producers', query => query.order('producer_no', { ascending: true })),
        selectAll('pallets', query => query.order('pallet_no', { ascending: true })),
        selectAll('pallet_detail_view', query => query.order('pallet_no', { ascending: true }).order('detail_no', { ascending: true })),
        selectAll('placements', query => query.order('location_id', { ascending: true })),
        selectAll('moving_pallets', query => query.order('started_at', { ascending: true })),
        optionalSelectAll('app_settings')
      ]);
      const settings = settingsByKey(appSettings);
      const locationNames = Object.fromEntries(locations.map(location => [location.location_id, location.display_name || location.location_id]));
      return {
        ok: true,
        master: {
          workers: workers.map(mapWorker),
          standards: standards.map(mapStandard),
          coolers: coolers.map(mapCooler),
          locations: locations.map(mapLocation),
          producers: producers.map(mapProducer),
          settings,
          producerSync: producerSyncFromSettings(settings.producer_import_source)
        },
        pallets: pallets.map(pallet => mapPallet(pallet, locationNames)),
        details: details.map(mapDetail),
        placements: placements.map(mapPlacement),
        moving: moving.map(row => mapMoving(row, locationNames)),
        histories: []
      };
    }

    async function selectAll(table, configure) {
      let query = supabaseClient.from(table).select('*');
      if (configure) query = configure(query);
      const { data, error } = await query;
      if (error) throw new Error(`${table}: ${error.message}`);
      return data || [];
    }

    async function optionalSelectAll(table, configure) {
      try {
        return await selectAll(table, configure);
      } catch (error) {
        console.warn(error.message);
        return [];
      }
    }

    function settingsByKey(rows = []) {
      return Object.fromEntries(rows.map(row => [row.setting_key, row.setting_value || {}]));
    }

    function producerSyncFromSettings(setting = {}) {
      return Object.assign({
        sourceName: 'Excel',
        path: DEFAULT_PRODUCER_IMPORT_SOURCE.path,

        fileUpdatedAt: '',
        aCount: 0,
        dCount: 0
      }, setting || {});
    }

      };
    }

      };

    function mapCooler(row) {
      return {

    function mapLocation(row) {

        locationId: row.location_id,

        row: toNumber(row.row_no),
        col: toNumber(row.col_no),

      };

    function mapProducer(row) {
