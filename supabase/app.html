        producerNo: row.producer_no,
        producerName: row.producer_name || '',
        producerSource: row.producer_source || row.source_column || ''
      };
    }

    function mapPallet(row, locationNames) {
      const locationId = row.current_location_id || '';
      return {
        palletNo: row.pallet_no,
        productionYear: String(row.crop_year || ''),
        serialNo: toNumber(row.serial_no),
        weight: toNumber(row.weight),
        memo: row.memo || '',
        status: row.status || '未配置',
        currentLocationId: locationId,
        currentLocationName: locationNames[locationId] || locationId,
        registeredAt: formatDateTimeText(row.registered_at),
        updatedAt: formatDateTimeText(row.updated_at)
      };
    }

    function mapDetail(row) {
      return {
        palletNo: row.pallet_no,
        detailNo: toNumber(row.detail_no),
        producerNo: row.producer_no || '',
        producerName: row.producer_name || '',
        standard: row.standard || '',
        weight: toNumber(row.weight),
        price: toNumber(row.price),
        memo: row.memo || ''
      };
    }

    function mapPlacement(row) {
      return {
        locationId: row.location_id,
        palletNo: row.pallet_no || '',
        status: row.status || '使用中',
        updatedAt: formatDateTimeText(row.updated_at)
      };
    }

    function mapMoving(row, locationNames) {
      const fromLocationId = row.from_location_id || '';
      return {
        palletNo: row.pallet_no,
        fromLocationId,
        fromLocationName: locationNames[fromLocationId] || fromLocationId,
        startedAt: formatDateTimeText(row.started_at),

        memo: row.memo || ''
      };
    }

    function palletSerialFromNo(palletNo) {
      const match = String(palletNo || '').match(/-(\d+)$/);
      return match ? Number(match[1]) : 0;
    }

    function toNumber(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number : 0;
    }

    function formatDateTimeText(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString('ja-JP', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showToast(message, isError = false) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.toggle('error', !!isError);
      toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.add('hidden'), isError ? 12000 : 2400);
    }

    function activeWorkers() {
      const workers = state.workers.length ? state.workers : (state.data ? state.data.master.workers : []);
      return workers.filter(w => w.active);
    }
    function activeCoolers() { return state.data ? state.data.master.coolers.filter(c => c.active) : []; }
    function activeStandards() { return state.data ? state.data.master.standards.filter(s => s.active) : []; }
    function activeProducers() {
      const producers = state.data && state.data.master.producers ? state.data.master.producers : [];
      return producers
        .map(enrichProducer)
        .filter(p => p.producerBaseNumber >= 1 && p.producerBaseNumber <= 999)
        .sort(compareProducer);
    }
    function sortedPallets() { return state.data ? [...state.data.pallets].sort((a, b) => a.palletNo.localeCompare(b.palletNo)) : []; }
    function findPallet(palletNo) { return state.data && state.data.pallets.find(p => p.palletNo === String(palletNo || '').trim()); }
    function findProducer(producerNo, sourceHint = '') {
      const target = cleanText(producerNo);
      if (!target) return null;
      const info = parseProducerNo(target, sourceHint);
      return findProducerByParsedInfo(info, target);
    }

    function findProducerFromInputCode(value) {
      const info = parseProducerInputCode(value);
      if (!info.baseNumber) return null;
      return findProducerByParsedInfo(info, cleanText(value));
    }

    function findProducerByParsedInfo(info, target = '') {
      if (!info || !info.source || !info.baseNumber) return null;
      const candidates = activeProducers()
        .filter(p => p.producerSource === info.source && p.producerBaseNumber === info.baseNumber)
        .sort((a, b) => producerMatchRank(a, info) - producerMatchRank(b, info) || compareProducer(a, b));
      if (!candidates.length) return null;
      const exact = candidates.find(p => cleanText(p.producerNo) === target);
      return exact || candidates[0];
    }

    function producerMatchRank(producer, info) {
      const digits = producerRawDigits(producer);
      const plain = String(info.baseNumber);
      if (info.source === 'D') {
        const padded = padNumber(info.baseNumber, 2);
        if (digits === padded) return 0;
        if (digits === plain) return 1;
        return 10;
      }
      const padded = padNumber(info.baseNumber, 3);
      if (digits === padded) return 0;
      if (digits === plain) return 1;
      if ((info.digits || '').length >= 4 && digits.length === 2 && digits === padNumber(info.baseNumber, 2)) return 50;
      return 10;
    }

    function producerRawDigits(producer) {
      return cleanText(producer && producer.producerNo).replace(/[^\d]/g, '');
    }

    function enrichProducer(producer) {
      const info = parseProducerNo(producer.producerNo, producer.producerSource);
      return {
        ...producer,
        producerSource: info.source || 'A',
        producerBaseNo: info.baseNo,
        producerBaseNumber: info.baseNumber,
        producerDisplayNo: info.displayNo
      };
    }

    function compareProducer(a, b) {
      return producerSourceOrder(a.producerSource) - producerSourceOrder(b.producerSource)
        || cleanText(a.producerBaseNo).localeCompare(cleanText(b.producerBaseNo), 'ja')
        || cleanText(a.producerName).localeCompare(cleanText(b.producerName), 'ja')
        || cleanText(a.producerNo).localeCompare(cleanText(b.producerNo), 'ja');
    }

    function producerSourceOrder(source) {
      return source === 'D' ? 2 : 1;
    }

    function parseProducerNo(value, sourceHint = '') {
      const raw = cleanText(value);
      const sourceFromHint = normalizeProducerSource(sourceHint);
      const digits = raw.replace(/[^\d]/g, '');
      if (!digits) {
        return { raw, source: sourceFromHint || 'A', baseNo: '', baseNumber: 0, displayNo: '' };
      }
      let source = sourceFromHint;
      if (!source) {
        if (digits.length >= 7) source = 'D';
        else source = 'A';
      }
      const baseDigits = source === 'D'
        ? digits.slice(-2)
        : (digits.length >= 4 ? digits.slice(-3) : digits);
      const baseNumber = Number(baseDigits);
      if (!Number.isFinite(baseNumber) || baseNumber <= 0) {
        return { raw, source, baseNo: '', baseNumber: 0, displayNo: '' };
      }
      return {
        raw,
        source,
        baseNo: formatProducerBaseNo(source, baseNumber),
        baseNumber,
        digits,
        displayNo: formatProducerBaseNo(source, baseNumber)
      };
    }

    function formatProducerBaseNo(source, baseNumber) {
      return padNumber(baseNumber, source === 'D' ? 2 : 3);
    }

    function parseProducerInputCode(value) {
      const raw = cleanText(value);
      const digits = raw.replace(/[^\d]/g, '');
      if (!digits) return { raw, source: '', baseNo: '', baseNumber: 0, displayNo: '' };
      if (digits.length === 7 || digits.length === 8) return parseProducerNo(raw, 'D');
      if (digits.length === 4 || digits.length === 5) return parseProducerNo(raw, 'A');
      if (digits.length === 3) return parseProducerNo(raw, 'A');
      if (digits.length === 2) return parseProducerNo(raw, 'D');
      return parseProducerNo(raw, 'A');
    }

    function normalizeProducerSource(value) {
      const text = cleanText(value).toUpperCase();
      if (text === 'D' || text === 'Ｄ' || text === 'D列') return 'D';
      if (text === 'A' || text === 'Ａ' || text === 'A列') return 'A';
      return '';
    }

    function producerChoiceDisplay(producer) {
      const p = enrichProducer(producer);
      return p.producerName || '(名称なし)';
    }

    function producerOptionCode(producer) {
      const p = enrichProducer(producer);
      return `${p.producerSource}列 ${p.producerDisplayNo} → ${buildStoredProducerNo(p)}`;
    }

    function producerSearchText(producer) {
      const p = enrichProducer(producer);
      return [
        p.producerName,
        p.producerNo,
        p.producerDisplayNo,
        p.producerBaseNo,
        p.producerSource,
        buildStoredProducerNo(p)
      ].filter(Boolean).join(' ');
    }

    function normalizeProducerNoForSave(value) {
      const text = cleanText(value);
      if (!text) return '';
      if (isStoredProducerNo(text)) return text.replace(/[^\d]/g, '');
      const producer = findProducerFromInputCode(text) || findProducer(text);
      if (producer) return buildStoredProducerNo(producer);
      const info = parseProducerInputCode(text);
      return info.baseNumber ? buildStoredProducerNo(info) : text;
    }

    function isStoredProducerNo(value) {
      const digits = cleanText(value).replace(/[^\d]/g, '');
      return /^\d{4,5}$/.test(digits) || /^\d{7,8}$/.test(digits);
    }

    function buildStoredProducerNo(producer) {
      const p = producer.producerBaseNumber
        ? producer
        : (producer.baseNumber
          ? {
            producerSource: producer.source || 'A',
            producerBaseNumber: producer.baseNumber,
            producerNo: producer.raw || producer.baseNo || ''
          }
          : enrichProducer(producer));
      if (!p.producerBaseNumber) return cleanText(producer.producerNo || producer.raw || '');
      if (p.producerSource === 'D') {
        const date = producerCodeDate();
        return `${reiwaYearFromYear(date.getFullYear())}${padNumber(date.getMonth() + 1, 2)}${padNumber(date.getDate(), 2)}${padNumber(p.producerBaseNumber, 2)}`;
      }
      return `${reiwaYearFromYear(producerCodeDate().getFullYear())}${padNumber(p.producerBaseNumber, 3)}`;
    }

    function producerCodeDate() {
      return new Date();
    }

    function reiwaYearFromYear(year) {
      const reiwa = Number(year) - 2018;
      return reiwa > 0 ? String(reiwa) : String(year);
    }

    function padNumber(value, length) {
      return String(Number(value || 0)).padStart(length, '0');
    }

    function resolveProducerForDetail(detail) {
      const source = parseProducerNo(detail.producerNo).source;
      return findProducer(detail.producerNo, source);
    }

    function resolveProducerName(detail) {
      const producer = resolveProducerForDetail(detail);
      return (producer && producer.producerName) || detail.producerName || '';
    }
    function qrProducerLabel(detail) {
      return [detail.producerNo, resolveProducerName(detail)].filter(Boolean).join(' ');
    }
    function producerLabel(detail) { return [detail.producerNo, resolveProducerName(detail)].filter(Boolean).join(' '); }
    function detailsFor(palletNo) { return state.data ? state.data.details.filter(d => d.palletNo === palletNo).sort((a, b) => a.detailNo - b.detailNo) : []; }
    function producerNosForPallet(palletNo) {
      return [...new Set(detailsFor(palletNo).map(d => cleanText(d.producerNo)).filter(Boolean))].join(' / ');
    }
    function cleanText(value) { return String(value || '').trim(); }
    function selectedCooler(selectId) { const id = $(selectId).value; return activeCoolers().find(c => c.coolerId === id) || activeCoolers()[0] || null; }
    function currentStorageLabel(pallet) {
      if (!pallet || !pallet.currentLocationId) return '未配置';
      const location = findLocation(pallet.currentLocationId) || parseLocationId(pallet.currentLocationId);
      if (!location) return pallet.currentLocationId;
      const cooler = activeCoolers().find(c => c.coolerId === location.coolerId);
      return `${cooler ? cooler.coolerName : location.coolerId} / ${location.level}段目`;
    }
    function currentStorageDetailLabel(pallet) {
      if (!pallet || !pallet.currentLocationId) return pallet && pallet.status ? pallet.status : '未配置';
      const location = findLocation(pallet.currentLocationId) || parseLocationId(pallet.currentLocationId);
      if (!location) return pallet.currentLocationId;
      const cooler = activeCoolers().find(c => c.coolerId === location.coolerId);
      return `${cooler ? cooler.coolerName : location.coolerId} / ${location.level}段目 / ${location.row}行${location.col}列`;
    }
    function findLocation(locationId) {
      return state.data && state.data.master.locations.find(loc => loc.locationId === locationId);
    }
    function parseLocationId(locationId) {
      const match = String(locationId || '').match(/^(.+)-(\d+)-R(\d+)-C(\d+)$/);
      if (!match) return null;
      return {
        locationId,
        coolerId: match[1],
        level: Number(match[2]),
        row: Number(match[3]),
        col: Number(match[4])
      };
    }
    function placementByLocation() {
      const map = {};
      (state.data ? state.data.placements : []).forEach(p => map[p.locationId] = p);
      return map;
    }
    function locationMatrix(cooler, level) {
      const existing = {};
      state.data.master.locations
        .filter(loc => loc.coolerId === cooler.coolerId && Number(loc.level) === Number(level))
        .forEach(loc => existing[`${loc.row}-${loc.col}`] = loc);
      const list = [];
      for (let row = 1; row <= Number(cooler.rowCount); row++) {
        for (let col = 1; col <= Number(cooler.colCount); col++) {
          list.push(existing[`${row}-${col}`] || {
            locationId: makeLocationId(cooler.coolerId, level, row, col),
            coolerId: cooler.coolerId,
            level,
            row,
            col,
            displayName: `R${String(row).padStart(2, '0')}-C${String(col).padStart(2, '0')}`,
            available: true
          });
        }
      }
      return list;
    }
    function makeLocationId(coolerId, level, row, col) {
      return `${coolerId}-${level}-R${String(row).padStart(2, '0')}-C${String(col).padStart(2, '0')}`;
    }
  </script>
</body>
</html>
